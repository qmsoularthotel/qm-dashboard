<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="color-scheme" content="light">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0A0A0A">
<title>Distribuzione Culligan — SoulArt</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#0A0A0A;
  --green:#059669;  --green-bg:#ECFDF5; --green-border:#6EE7B7;
  --amber:#D97706;  --amber-bg:#FFFBEB; --amber-border:#FCD34D;
  --red:#DC2626;    --red-bg:#FEF2F2;   --red-border:#FCA5A5;
  --blue:#2563EB;   --blue-bg:#EFF6FF;
  --purple:#7C3AED; --purple-bg:#F5F3FF;
  --bg:#EBEBED;--surface:#FFFFFF;--border:#E0E0E3;
  --text:#0A0A0A;--text-dim:#71717A;--text-muted:#A1A1AA;
  --r:13px;--sh:0 1px 3px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.04);
}
html{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;}
body{min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* ══ HEADER ══ */
.hdr{background:var(--black);color:#fff;padding:0 16px;
  height:56px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;flex-shrink:0;}
.hdr-logo{height:24px;width:auto;object-fit:contain;flex-shrink:0;}
.hdr-sep{width:1px;height:20px;background:rgba(255,255,255,.15);flex-shrink:0;}
.hdr-center{flex:1;min-width:0;}
.hdr-title{font-size:.82rem;font-weight:600;line-height:1.2;letter-spacing:.01em;}
.hdr-sub{font-size:.6rem;color:rgba(255,255,255,.45);margin-top:1px;}
.btn-back{background:none;border:none;color:rgba(255,255,255,.7);
  font-size:1.6rem;cursor:pointer;padding:4px 8px 4px 0;line-height:1;
  -webkit-tap-highlight-color:transparent;flex-shrink:0;}
.hdr-date{font-size:.72rem;font-weight:700;color:rgba(255,255,255,.55);
  white-space:nowrap;flex-shrink:0;}

/* ══ BODY ══ */
.body{flex:1;overflow-y:auto;padding:12px 12px 24px;}

/* ══ BANNER PIANO ══ */
.piano-banner{border-radius:var(--r);padding:11px 14px;margin-bottom:10px;
  font-size:.77rem;font-weight:500;line-height:1.45;}
.piano-banner.loaded {background:#D1FAE5;color:#065F46;}
.piano-banner.partial{background:#FEF9C3;color:#854D0E;}
.piano-banner.missing{background:#FEF9C3;color:#854D0E;
  display:flex;align-items:center;justify-content:space-between;gap:8px;}
.btn-reload-piano{background:rgba(0,0,0,.1);border:none;color:inherit;
  padding:5px 12px;border-radius:20px;font-size:.72rem;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0;}

/* ══ PROGRESS ══ */
.prog-wrap{background:var(--surface);border-radius:var(--r);
  padding:13px 16px 14px;margin-bottom:10px;box-shadow:var(--sh);}
.prog-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.prog-lbl{font-size:.68rem;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--text-muted);}
.prog-val{font-size:1.1rem;font-weight:800;color:var(--black);}
.prog-bar{height:5px;background:#EBEBEB;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--black);border-radius:3px;transition:width .5s;}

/* ══ STAT GRID ══ */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px;}
.stat-box{background:var(--surface);border-radius:var(--r);
  padding:12px 6px;text-align:center;box-shadow:var(--sh);}
.stat-n{font-size:1.4rem;font-weight:800;line-height:1;}
.stat-l{font-size:.58rem;font-weight:600;letter-spacing:.02em;
  color:var(--text-muted);margin-top:4px;line-height:1.2;}

/* ══ BOTTONI ══ */
.action-row{display:flex;gap:8px;margin-bottom:12px;}
.btn-main{flex:1;background:var(--black);color:#fff;border:none;
  padding:14px 10px;border-radius:var(--r);font-size:.88rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  -webkit-tap-highlight-color:transparent;}
.btn-main:active{opacity:.75;}
.btn-sec{flex:1;background:var(--surface);border:1.5px solid var(--border);
  color:var(--text-dim);padding:14px 10px;border-radius:var(--r);
  font-size:.82rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  -webkit-tap-highlight-color:transparent;}
.btn-sec:active{opacity:.7;}

/* ══ ROOM GRID ══ */
.rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.room-card{background:var(--surface);border-radius:var(--r);
  padding:12px 8px 10px;cursor:pointer;box-shadow:var(--sh);
  border:1px solid var(--border);text-align:center;
  -webkit-tap-highlight-color:transparent;transition:transform .1s;
  display:flex;flex-direction:column;align-items:center;gap:4px;}
.room-card:active{transform:scale(.92);}
.room-card.s-empty  {opacity:.55;border:2px solid #9CA3AF;}
.room-card.s-bottle {background:#DBEAFE;border:2.5px solid #2563EB;}
.room-card.s-both   {background:#DBEAFE;border:2.5px solid #2563EB;}
.room-card.s-ok     {background:#D1FAE5;border:2.5px solid #059669;}
.room-card.s-dnd    {background:#FEE2E2;border:2.5px solid #DC2626;}
.room-card.s-missing{background:#FEE2E2;border:2.5px solid #DC2626;}

/* numero camera */
.rc-num{font-size:.9rem;font-weight:800;color:#1C1C1E;
  letter-spacing:.03em;text-transform:uppercase;line-height:1;}

/* icona piano — elemento principale */
.rc-piano-ico{font-size:1.8rem;line-height:1;margin:2px 0 0;}
.rc-piano-ico img{display:block;margin:0 auto;}
/* sprite aereo: immagine 2:1, mostra metà sinistra (partenza) o metà destra (arrivo) */
.ico-partenza{width:32px;height:32px;object-fit:cover;object-position:0% center;}
.ico-arrivo  {width:32px;height:32px;object-fit:cover;object-position:100% center;}
/* mix-blend-mode:multiply rende trasparente il bianco interno delle immagini su sfondo colorato */
.ico-cambio  {width:60px;height:30px;object-fit:cover;object-position:center;mix-blend-mode:multiply;}
.ico-fermata {height:30px;width:auto;display:block;margin:2px auto 0;mix-blend-mode:multiply;}

/* label piano */
.rc-piano-lbl{font-size:.74rem;font-weight:700;color:#27272A;}

/* indicatore bottiglia/stato visita — in basso */
.rc-dot{font-size:.72rem;font-weight:700;margin-top:2px;min-height:1em;}
.rc-dot.d-pending{color:#71717A;}
.rc-dot.d-ok     {color:#059669;font-size:.78rem;}
.rc-dot.d-bottle {color:#B45309;font-size:.78rem;}
.rc-dot.d-warn   {color:#B91C1C;}
.rc-dot.d-both   {color:#B91C1C;}
.rc-dot.d-dnd    {color:#B91C1C;}
.rc-dot.d-missing{color:#B91C1C;}
.rc-dot.d-empty  {color:#A1A1AA;}

/* ══ CHECKLIST ══ */
.cl-body{flex:1;overflow-y:auto;padding:12px 12px 90px;}

.piano-strip{border-radius:10px;padding:13px 14px;margin-bottom:12px;
  font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.ps-partenza{background:#FEE2E2;color:#B91C1C;}
.ps-fermata {background:#DBEAFE;color:#1D4ED8;}
.ps-cambio  {background:#F3E8FF;color:#7C3AED;}
.ps-libera  {background:#F4F4F5;color:#71717A;}

/* Bottiglia */
.bottle-card{background:var(--surface);border-radius:var(--r);
  padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh);border:1.5px solid var(--border);}
.bottle-card-title{font-size:.75rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--text-muted);margin-bottom:10px;}
.bottle-seg{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.bseg{flex:1;padding:15px 8px;border:1.5px solid var(--border);
  border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;
  background:#F4F4F5;color:var(--text-muted);line-height:1.4;text-align:center;
  -webkit-tap-highlight-color:transparent;transition:all .15s;}
.bseg:active{opacity:.8;}
.bseg.bc-consumata{background:#DBEAFE;border-color:#3B82F6;color:#1D4ED8;}
.bseg.bc-noncons  {background:#D1FAE5;border-color:#10B981;color:#065F46;}
.bseg.bc-nonpres  {background:#FEE2E2;border-color:#EF4444;color:#B91C1C;}
.bseg.bc-dnd      {background:#FEE2E2;border-color:#EF4444;color:#B91C1C;}

/* DND */
.dnd-card{background:#FFF1F2;border:1.5px solid #FECACA;border-radius:var(--r);
  padding:20px 16px;margin-bottom:10px;text-align:center;}
.dnd-card-title{font-size:1.05rem;font-weight:800;color:var(--red);margin-bottom:4px;}
.dnd-card-sub{font-size:.78rem;color:#EF4444;line-height:1.5;}

/* Quick */
.quick-row{display:flex;gap:7px;margin-bottom:10px;}
.btn-q{flex:1;background:var(--surface);border:1.5px solid var(--border);
  color:var(--text-muted);padding:13px 4px;border-radius:10px;
  font-size:.92rem;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent;line-height:1.3;text-align:center;}
.btn-q.active-libera{background:#F4F4F5;border-color:#A1A1AA;color:#3F3F46;}
.btn-q.active-dnd   {background:#FEE2E2;border-color:#FCA5A5;color:var(--red);}
.btn-q.btn-ok{border-color:var(--green-border);color:var(--green);font-weight:700;}
.btn-q:active{opacity:.7;}

/* Checklist sections */
.chk-sec{background:var(--surface);border-radius:var(--r);
  margin-bottom:10px;overflow:hidden;box-shadow:var(--sh);}
.chk-sec-hdr{padding:11px 14px;font-size:.75rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--text-muted);background:#FAFAFA;
  display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.chk-all-btn{font-size:.78rem;color:var(--black);font-weight:700;
  cursor:pointer;background:none;border:none;padding:2px 8px;
  -webkit-tap-highlight-color:transparent;}
.chk-item{display:flex;align-items:center;padding:15px 14px;gap:13px;
  cursor:pointer;border-bottom:1px solid #F4F4F5;-webkit-tap-highlight-color:transparent;}
.chk-item:last-child{border-bottom:none;}
.chk-item:active{background:#FAFAFA;}
.chk-box{width:30px;height:30px;border-radius:8px;border:2px solid #D4D4D8;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:.95rem;font-weight:800;color:#fff;transition:all .12s;}
.chk-box.on{background:var(--green);border-color:var(--green);}
.chk-lbl{font-size:1rem;line-height:1.35;color:var(--text);}

/* Note */
.note-card{background:var(--surface);border-radius:var(--r);
  padding:14px;margin-bottom:10px;box-shadow:var(--sh);}
.note-label{font-size:.75rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--text-muted);display:block;margin-bottom:8px;}
textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;
  padding:10px 12px;font-size:1rem;font-family:inherit;resize:none;
  color:var(--text);background:#FAFAFA;}
textarea:focus{outline:none;border-color:#A1A1AA;}

/* Save bar */
.save-bar{position:fixed;bottom:0;left:0;right:0;
  padding:10px 12px max(12px,env(safe-area-inset-bottom));
  background:var(--black);z-index:200;}
.btn-save{width:100%;background:#fff;color:var(--black);border:none;
  padding:15px;border-radius:10px;font-size:1rem;font-weight:800;
  cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn-save:active{opacity:.85;}

/* ══ SUMMARY ══ */
.sum-body{flex:1;overflow-y:auto;padding:12px 12px 28px;}
.sum-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px;}
.sum-stat{background:var(--surface);border-radius:var(--r);
  padding:13px 4px;text-align:center;box-shadow:var(--sh);}
.sum-stat-n{font-size:1.4rem;font-weight:800;line-height:1;}
.sum-stat-l{font-size:.56rem;font-weight:600;letter-spacing:.02em;
  color:var(--text-muted);margin-top:4px;line-height:1.2;}
.btn-print-sum{width:100%;background:var(--surface);border:1.5px solid var(--border);
  color:var(--text-dim);padding:12px;border-radius:var(--r);
  font-size:.88rem;font-weight:700;cursor:pointer;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;gap:7px;
  -webkit-tap-highlight-color:transparent;}
.btn-print-sum:active{opacity:.7;}

.sum-card{background:var(--surface);border-radius:var(--r);
  margin-bottom:10px;overflow:hidden;box-shadow:var(--sh);}
.sum-hdr{padding:12px 16px;font-size:.85rem;font-weight:700;
  display:flex;align-items:center;gap:8px;}
.sum-hdr.h-bottle{background:var(--amber-bg);color:#92400E;}
.sum-hdr.h-dnd   {background:var(--red-bg);color:#B91C1C;}
.sum-hdr.h-warn  {background:var(--red-bg);color:#B91C1C;}
.sum-hdr.h-ok    {background:var(--green-bg);color:#065F46;}
.sum-hdr.h-pend  {background:#F4F4F5;color:var(--text-dim);}
.sum-hdr.h-empty {background:#F4F4F5;color:#71717A;}
.pills{padding:12px 14px;display:flex;flex-wrap:wrap;gap:7px;}
.pill{padding:6px 13px;border-radius:20px;font-size:.84rem;font-weight:700;border:1.5px solid transparent;}
.pill-bottle{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border);}
.pill-dnd   {background:var(--red-bg);color:var(--red);border-color:#FCA5A5;}
.pill-warn  {background:var(--red-bg);color:var(--red);border-color:var(--red-border);}
.pill-ok    {background:var(--green-bg);color:var(--green);}
.pill-pend  {background:#F4F4F5;color:var(--text-dim);}
.pill-empty {background:#F4F4F5;color:var(--text-muted);}
.warn-list{padding:0 14px 12px;}
.warn-item{padding:9px 0;border-bottom:1px solid #F4F4F5;}
.warn-item:last-child{border-bottom:none;}
.warn-room{font-weight:800;font-size:.9rem;color:var(--red);}
.warn-fail{font-size:.75rem;color:var(--text-dim);margin-top:3px;line-height:1.5;}
.warn-note{font-size:.75rem;color:var(--text-muted);margin-top:2px;font-style:italic;}
.btn-reset{width:100%;background:none;border:1.5px solid #FCA5A5;
  color:var(--red);padding:12px;border-radius:10px;
  font-size:.85rem;font-weight:600;cursor:pointer;margin-top:6px;
  -webkit-tap-highlight-color:transparent;}
</style>
</head>
<body>

<!-- ══ HOME ══════════════════════════════ -->
<div class="screen active" id="s-home">
  <div class="hdr">
    <img src="img/logo-culligan.png" class="hdr-logo" alt="SoulArt" onerror="this.style.display='none'">
    <div class="hdr-sep"></div>
    <div class="hdr-center">
      <div class="hdr-title">Distribuzione Culligan</div>
      <div class="hdr-sub">SoulArt Hotel · Art 1–22</div>
    </div>
    <span class="hdr-date" id="home-chip"></span>
  </div>
  <div class="body">
    <div id="piano-banner"></div>
    <div class="prog-wrap">
      <div class="prog-row">
        <span class="prog-lbl">Camere visitate</span>
        <span class="prog-val" id="prog-txt">0 / 22</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="stat-grid" id="stat-row"></div>
    <div class="action-row">
      <button class="btn-main" onclick="showSummary()">Riepilogo</button>
    </div>
    <div class="rooms-grid" id="rooms-grid"></div>
  </div>
</div>

<!-- ══ CHECKLIST CAMERA ═══════════════════ -->
<div class="screen" id="s-room">
  <div class="hdr">
    <button class="btn-back" onclick="goHome()">‹</button>
    <img src="img/logo-culligan.png" class="hdr-logo" alt="SoulArt" onerror="this.style.display='none'">
    <div class="hdr-sep"></div>
    <div class="hdr-center"><div class="hdr-title" id="room-title">Art 1</div></div>
    <span class="hdr-date" id="room-chip"></span>
  </div>
  <div class="cl-body" id="cl-body"></div>
  <div class="save-bar"><button class="btn-save" onclick="saveRoom()">Salva camera</button></div>
</div>

<!-- ══ RIEPILOGO ══════════════════════════ -->
<div class="screen" id="s-summary">
  <div class="hdr">
    <button class="btn-back" onclick="goHome()">‹</button>
    <img src="img/logo-culligan.png" class="hdr-logo" alt="SoulArt" onerror="this.style.display='none'">
    <div class="hdr-sep"></div>
    <div class="hdr-center"><div class="hdr-title">Riepilogo</div></div>
    <span class="hdr-date" id="sum-chip"></span>
  </div>
  <div class="sum-body" id="sum-body"></div>
</div>

<script>
'use strict';

const PROXY = 'https://anthropic-proxy.qm-d82.workers.dev';
const ROOMS = Array.from({length:22}, (_,i) => 'Art '+(i+1));

const CHECKS = [
  {id:'acqua', label:'💧 Kit Acqua Culligan', items:[
    {id:'a1', label:'Vassoio posizionato in angolo della scrivania'},
    {id:'a2', label:'Bottiglia Culligan presente'},
    {id:'a3', label:'Logo visibile'},
    {id:'a4', label:'Cartellino "Benvenuti" inserito e centrato'},
    {id:'a5', label:'2 bicchieri capovolti a destra'},
  ]},
  {id:'scrivania', label:'🗄 Scrivania', items:[
    {id:'s1',  label:'Cartello "Non Disturbare" — posizione sinistra'},
    {id:'s2',  label:'Bollitore elettrico presente e posizionato'},
    {id:'s3',  label:'2 tazze con piattini — manici a destra'},
    {id:'s4',  label:'2× Nescafé'},
    {id:'s5',  label:'2× Tè Varietà 1'},
    {id:'s6',  label:'2× Tè Varietà 2'},
    {id:'s7',  label:'2× Camomilla'},
    {id:'s8',  label:'2× Zucchero Bianco'},
    {id:'s9',  label:'2× Zucchero di Canna'},
    {id:'s10', label:'1× Biscotti sigillati'},
    {id:'s11', label:'2× Bacchette'},
    {id:'s12', label:'Cataloghi aziendali / arte presenti'},
    {id:'s13', label:'Pulizia scrivania ok'},
  ]},
  {id:'amenities', label:'🧴 Amenities Bagno — Lamystique', items:[
    {id:'m1', label:'Body Lotion Lamystique'},
    {id:'m2', label:'Shoe Sponge'},
    {id:'m3', label:'2× Sapone Lamystique'},
    {id:'m4', label:'Cuffia da bagno'},
    {id:'m5', label:'Vanity set'},
  ]},
];
const ALL_IDS = CHECKS.flatMap(s => s.items.map(i => i.id));

// Piano — "cambio" diventa "Partenza con arrivo"
const PIANO_ICO = {partenza:'🛫', fermata:'🛏', cambio:'🔄', libera:'🚪'};
const PIANO_LBL = {partenza:'Partenza', fermata:'Fermata', cambio:'Partenza + Arrivo', libera:'Libera'};
const PIANO_CSS = {partenza:'pb-partenza', fermata:'pb-fermata', cambio:'pb-cambio', libera:'pb-libera'};
const PIANO_STRIP = {partenza:'ps-partenza', fermata:'ps-fermata', cambio:'ps-cambio', libera:'ps-libera'};
const PIANO_DESC = {
  partenza:'Ospite in check-out oggi',
  fermata: 'Ospite si ferma ancora',
  cambio:  'Check-out e check-in in giornata',
  libera:  'Camera libera — nessuna azione richiesta',
};

// ── STATE ────────────────────────────
let _state = {};
let _cur   = null;
let _pianoDay    = null;
let _pianoLoaded = false; // true se piano trovato ovunque (anche se oggi non è nel piano)

const _todayKey = (() => {
  const d = new Date();
  return 'qm_cm_'+d.getFullYear()+'-'+
    String(d.getMonth()+1).padStart(2,'0')+'-'+
    String(d.getDate()).padStart(2,'0');
})();

// ── PIANO ────────────────────────────
function _todayDMY() {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0')+'/'+
         String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}
async function _loadPiano() {
  // 1. localStorage (PC/dispositivo dove è stato caricato)
  try {
    const raw = localStorage.getItem('qm_piano');
    if (raw) {
      const piano = JSON.parse(raw);
      if (piano?.giorni?.length) {
        _pianoLoaded = true;
        _pianoDay = piano.giorni.find(g => g.data === _todayDMY()) || null;
        if (_pianoDay) _applyPianoLibere();
        return; // trovato in locale, ok
      }
    }
  } catch(e) {}
  // 2. KV cloud (smartphone che non ha mai aperto il dashboard)
  try {
    const r = await fetch(PROXY + '/kv/get?key=qm_piano');
    if (r.ok) {
      const j = await r.json();
      if (j?.value) {
        try { localStorage.setItem('qm_piano', j.value); } catch(e) {}
        const piano = JSON.parse(j.value);
        if (piano?.giorni?.length) {
          _pianoLoaded = true;
          _pianoDay = piano.giorni.find(g => g.data === _todayDMY()) || null;
          if (_pianoDay) _applyPianoLibere();
        }
      }
    }
  } catch(e) {}
}
async function _reloadPianoCloud() {
  const pb=document.getElementById('piano-banner');
  if(pb) pb.innerHTML=`<div class="piano-banner missing">⏳ Caricamento dal cloud…</div>`;
  _pianoLoaded=false;_pianoDay=null;
  try {
    const r=await fetch(PROXY+'/kv/get?key=qm_piano');
    if(r.ok){
      const j=await r.json();
      if(j?.value){
        try{localStorage.setItem('qm_piano',j.value);}catch(e){}
        const piano=JSON.parse(j.value);
        if(piano?.giorni?.length){
          _pianoLoaded=true;
          _pianoDay=piano.giorni.find(g=>g.data===_todayDMY())||null;
          if(_pianoDay)_applyPianoLibere();
        }
      }
    }
  }catch(e){}
  _renderHome();
}
function _applyPianoLibere() {
  if (!_pianoDay) return;
  const sa = _pianoDay.soulart;
  const inPlan = new Set([...sa.partenze, ...sa.fermate, ...sa.cambi]);
  ROOMS.forEach(room => {
    if (!inPlan.has(room) && !_state[room]) {
      _state[room] = _defaultRoom();
      _state[room].visited = true;
      _state[room].libera  = true;
    }
  });
}
function _pianoSt(room) {
  if (!_pianoDay) return null;
  const sa = _pianoDay.soulart;
  if (sa.cambi.includes(room))    return 'cambio';
  if (sa.partenze.includes(room)) return 'partenza';
  if (sa.fermate.includes(room))  return 'fermata';
  return 'libera';
}

// ── PERSISTENZA ──────────────────────
function _load() {
  try { const r=localStorage.getItem(_todayKey); if(r)_state=JSON.parse(r); } catch(e){}
}
function _persist() {
  try { localStorage.setItem(_todayKey,JSON.stringify(_state)); } catch(e){}
  fetch(PROXY+'/kv/set',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({key:_todayKey,value:JSON.stringify(_state)})}).catch(()=>{});
}
function _defaultRoom() {
  const checks={};
  ALL_IDS.forEach(id=>checks[id]=true);
  return {visited:false, libera:false, dnd:false, bottiglia:'consumata', checks, note:''};
}
function _rs(room) {
  if(!_state[room])_state[room]=_defaultRoom();
  return _state[room];
}

// ── STATUS ───────────────────────────
// dnd    = Non Disturbare (non visitabile)
// bottle = bottiglia consumata (vuota) → portare bottiglia
// ok     = bottiglia non consumata (piena) + tutto conforme
function _status(room) {
  const rs=_state[room];
  if(!rs||!rs.visited) return 'pending';
  if(rs.dnd)           return 'dnd';
  if(rs.libera)        return 'empty';
  if(rs.bottiglia==='non_presente') return 'missing';
  const nc=Object.values(rs.checks).some(v=>!v);
  const nb=rs.bottiglia==='consumata'; // consumata = vuota = porta bottiglia
  if(nc&&nb) return 'both';
  if(nc)     return 'warn';
  if(nb)     return 'bottle';
  return 'ok';
}

// ── HELPERS ──────────────────────────
function _fmtShort(){const d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');}
function _fmtFull(){return new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function _screen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

// ── HOME ──────────────────────────────
function goHome(){_renderHome();_screen('s-home');}

function _renderHome(){
  document.getElementById('home-chip').textContent=_fmtShort();

  // Piano banner
  const pb=document.getElementById('piano-banner');
  if(_pianoDay){
    const sa=_pianoDay.soulart;
    const nLib=ROOMS.filter(r=>_pianoSt(r)==='libera').length;
    pb.innerHTML=`<div class="piano-banner loaded">✅ Piano caricato — ${sa.partenze.length} partenze · ${sa.fermate.length} fermate · ${sa.cambi.length} partenze+arrivo · ${nLib} libere</div>`;
  } else if(_pianoLoaded){
    pb.innerHTML=`<div class="piano-banner partial">⚠️ Piano trovato ma non include la data di oggi — ricaricare il piano dal dashboard per la settimana corrente</div>`;
  } else {
    pb.innerHTML=`<div class="piano-banner missing"><span>⚠️ Piano non trovato — caricarlo dal dashboard</span><button class="btn-reload-piano" onclick="_reloadPianoCloud()">🔄 Ricarica</button></div>`;
  }

  // Progress (esclude le libere auto-impostate)
  const active=ROOMS.filter(r=>_pianoSt(r)!=='libera'||!_pianoDay);
  const visited=active.filter(r=>_state[r]?.visited&&!_state[r]?.libera).length;
  const total=active.length;
  document.getElementById('prog-txt').textContent=visited+' / '+total;
  document.getElementById('prog-fill').style.width=(total>0?(visited/total*100):0)+'%';

  // Stats
  let nBtl=0,nDnd=0,nOk=0,nPend=0;
  ROOMS.forEach(r=>{
    const s=_status(r);
    if(s==='bottle'||s==='both'||s==='missing') nBtl++;
    else if(s==='dnd')                          nDnd++;
    else if(s==='ok')            nOk++;
    else if(s==='pending')       nPend++;
  });
  document.getElementById('stat-row').innerHTML=[
    [nBtl,'Da portare','var(--amber)'],
    [nDnd,'Non Dist.','var(--red)'],
    [nOk, 'OK','var(--green)'],
    [nPend,'Da fare','var(--text-muted)'],
  ].map(([n,lbl,col])=>`<div class="stat-box">
    <div class="stat-n" style="color:${col}">${n}</div>
    <div class="stat-l">${lbl}</div>
  </div>`).join('');

  // Grid — 3 colonne
  // Piano: icona grande + label (info principale)
  // Dot in basso: stato visita/bottiglia (info secondaria)
  const PS_ICO ={
    partenza:'<img src="img/aerei.png" class="ico-partenza" alt="Partenza">',
    fermata: '<img src="img/fermata.png" class="ico-fermata" alt="Fermata">',
    cambio:  '<img src="img/aerei.png" class="ico-cambio" alt="Partenza+Arrivo">',
    libera:  '<img src="img/open-sign.png" alt="Libera" style="height:30px;width:auto;display:block;margin:2px auto 0;">',
    null:    '—'
  };
  const PS_LBL ={partenza:'Partenza',fermata:'Fermata',cambio:'Partenza + Arrivo',libera:'Libera'};
  const DOT_TXT={pending:'○ da visitare',ok:'✓ ok',warn:'⚠ non conforme',
    bottle:'💧 porta bottiglia',both:'💧 ⚠ porta + KO',empty:'',dnd:'🚫 non disturbare',missing:'❌ non presente'};
  document.getElementById('rooms-grid').innerHTML=ROOMS.map(room=>{
    const st=_status(room);
    const ps=_pianoSt(room);
    const ico=ps?PS_ICO[ps]:'—';
    const lbl=ps?PS_LBL[ps]:'';
    const dot=DOT_TXT[st]||'';
    return`<div class="room-card s-${st}" onclick="openRoom('${room}')">
      <div class="rc-num">${room}</div>
      <div class="rc-piano-ico">${ico}</div>
      <div class="rc-piano-lbl">${lbl}</div>
      <div class="rc-dot d-${st}">${dot}</div>
    </div>`;
  }).join('');
}

// ── CHECKLIST ────────────────────────
function openRoom(room){
  _cur=room;
  const rs=_rs(room);
  const ps=_pianoSt(room);

  document.getElementById('room-title').textContent=room;
  document.getElementById('room-chip').textContent=_fmtShort();

  let h='';

  // Piano strip
  if(ps){
    h+=`<div class="piano-strip ${PIANO_STRIP[ps]}">
      ${PIANO_ICO[ps]} ${PIANO_LBL[ps]} — <span style="font-weight:400;">${PIANO_DESC[ps]}</span>
    </div>`;
  }

  // Quick actions (3 buttons)
  h+=`<div class="quick-row">
    <button class="btn-q${rs.libera?' active-libera':''}" onclick="toggleLibera()">🚪<br>Libera</button>
    <button class="btn-q${rs.dnd?' active-dnd':''}" id="btn-dnd" onclick="toggleDnd()">🚫<br>Non Dist.</button>
    <button class="btn-q btn-ok" onclick="tuttoOk()">✓✓<br>Tutto ok</button>
  </div>`;

  // Bottiglia — sempre visibile con 3 opzioni
  const bc=rs.bottiglia;
  h+=`<div class="bottle-card">
    <div class="bottle-card-title">💧 Acqua Culligan — stato bottiglia</div>
    <div class="bottle-seg">
      <button class="bseg ${bc==='consumata'&&!rs.dnd?'bc-consumata':''}" id="bb-cons"
        onclick="setBottle('consumata')">💧 Consumata<br><span style="font-size:.68rem;opacity:.85;">→ porta bottiglia</span></button>
      <button class="bseg ${bc==='non_consumata'&&!rs.dnd?'bc-noncons':''}" id="bb-nc"
        onclick="setBottle('non_consumata')">✅ Non consumata<br><span style="font-size:.68rem;opacity:.85;">→ nessuna azione</span></button>
      <button class="bseg ${bc==='non_presente'&&!rs.dnd?'bc-nonpres':''}" id="bb-np"
        onclick="setBottle('non_presente')">❌ Non presente<br><span style="font-size:.68rem;opacity:.85;">→ bottiglia mancante</span></button>
      <button class="bseg ${rs.dnd?'bc-dnd':''}" id="bb-dnd"
        onclick="setBottleDnd()">🚫 Non disturbare<br><span style="font-size:.68rem;opacity:.85;">→ non visitare</span></button>
    </div>
  </div>`;

  if(rs.dnd){
    // DND attivo: mostra messaggio, nascondi checklist
    h+=`<div class="dnd-card">
      <div class="dnd-card-title">🚫 Non Disturbare</div>
      <div class="dnd-card-sub">Camera non visitabile — la bottiglia non può essere verificata.</div>
    </div>`;
  } else if(!rs.libera){
    // Checklist (nascosta se camera libera)
    CHECKS.forEach(sec=>{
      const allOn=sec.items.every(i=>rs.checks[i.id]);
      h+=`<div class="chk-sec">
        <div class="chk-sec-hdr">
          <span>${sec.label}</span>
          <button class="chk-all-btn" data-sid="${sec.id}"
            onclick="toggleSec('${sec.id}',${!allOn})">${allOn?'Deseleziona tutti':'Seleziona tutti'}</button>
        </div>`;
      sec.items.forEach(item=>{
        const on=rs.checks[item.id];
        h+=`<div class="chk-item" onclick="toggleChk('${item.id}')">
          <div class="chk-box ${on?'on':''}" id="cb-${item.id}">${on?'✓':''}</div>
          <span class="chk-lbl">${item.label}</span>
        </div>`;
      });
      h+=`</div>`;
    });
  }

  h+=`<div class="note-card">
    <label class="note-label">📝 Note</label>
    <textarea id="room-note" rows="3" placeholder="Osservazioni…">${rs.note||''}</textarea>
  </div>`;

  document.getElementById('cl-body').innerHTML=h;
  _screen('s-room');
}

function setBottle(val){
  const rs=_rs(_cur);
  const wasDnd=rs.dnd;
  rs.bottiglia=val;
  rs.dnd=false;
  if(wasDnd){
    openRoom(_cur); // ri-render per mostrare la checklist
  } else {
    const c=document.getElementById('bb-cons');
    const n=document.getElementById('bb-nc');
    const p=document.getElementById('bb-np');
    const d=document.getElementById('bb-dnd');
    if(c)c.className='bseg'+(val==='consumata'?' bc-consumata':'');
    if(n)n.className='bseg'+(val==='non_consumata'?' bc-noncons':'');
    if(p)p.className='bseg'+(val==='non_presente'?' bc-nonpres':'');
    if(d)d.className='bseg';
  }
}
function setBottleDnd(){
  const rs=_rs(_cur);
  rs.dnd=!rs.dnd;
  if(rs.dnd)rs.libera=false;
  openRoom(_cur);
}
function toggleLibera(){
  const rs=_rs(_cur);
  rs.libera=!rs.libera;
  if(rs.libera)rs.dnd=false;
  openRoom(_cur);
}
function toggleDnd(){
  const rs=_rs(_cur);
  rs.dnd=!rs.dnd;
  if(rs.dnd)rs.libera=false;
  openRoom(_cur);
}
function tuttoOk(){
  const rs=_rs(_cur);
  ALL_IDS.forEach(id=>{
    rs.checks[id]=true;
    const b=document.getElementById('cb-'+id);
    if(b){b.className='chk-box on';b.textContent='✓';}
  });
  document.querySelectorAll('.chk-all-btn').forEach(btn=>{
    btn.textContent='Deseleziona tutti';
    btn.setAttribute('onclick',`toggleSec('${btn.dataset.sid}',false)`);
  });
}
function toggleChk(id){
  const rs=_rs(_cur);
  rs.checks[id]=!rs.checks[id];
  const b=document.getElementById('cb-'+id);
  if(b){b.className='chk-box'+(rs.checks[id]?' on':'');b.textContent=rs.checks[id]?'✓':'';}
  const sec=CHECKS.find(s=>s.items.some(i=>i.id===id));
  if(sec){
    const allOn=sec.items.every(i=>rs.checks[i.id]);
    const btn=document.querySelector(`.chk-all-btn[data-sid="${sec.id}"]`);
    if(btn){btn.textContent=allOn?'Deseleziona tutti':'Seleziona tutti';btn.setAttribute('onclick',`toggleSec('${sec.id}',${!allOn})`);}
  }
}
function toggleSec(sid,makeOn){
  const rs=_rs(_cur);const sec=CHECKS.find(s=>s.id===sid);if(!sec)return;
  sec.items.forEach(item=>{
    rs.checks[item.id]=makeOn;
    const b=document.getElementById('cb-'+item.id);
    if(b){b.className='chk-box'+(makeOn?' on':'');b.textContent=makeOn?'✓':'';}
  });
  const btn=document.querySelector(`.chk-all-btn[data-sid="${sid}"]`);
  if(btn){btn.textContent=makeOn?'Deseleziona tutti':'Seleziona tutti';btn.setAttribute('onclick',`toggleSec('${sid}',${!makeOn})`);}
}
function saveRoom(){
  const rs=_rs(_cur);
  rs.visited=true;
  rs.note=document.getElementById('room-note')?.value||'';
  _persist();
  goHome();
}

// ── SUMMARY ──────────────────────────
function showSummary(){
  const btl=ROOMS.filter(r=>{const s=_status(r);return s==='bottle'||s==='both';});
  const dnd=ROOMS.filter(r=>_status(r)==='dnd');
  const wrn=ROOMS.filter(r=>_status(r)==='warn');
  const ok =ROOMS.filter(r=>_status(r)==='ok');
  const emp=ROOMS.filter(r=>_status(r)==='empty');
  const pnd=ROOMS.filter(r=>_status(r)==='pending');

  document.getElementById('sum-chip').textContent=_fmtShort();

  let h=`<div class="sum-stats">
    <div class="sum-stat"><div class="sum-stat-n" style="color:var(--amber)">${btl.length}</div><div class="sum-stat-l">💧 Da portare</div></div>
    <div class="sum-stat"><div class="sum-stat-n" style="color:#B91C1C">${dnd.length}</div><div class="sum-stat-l">🚫 Non Dist.</div></div>
    <div class="sum-stat"><div class="sum-stat-n" style="color:var(--green)">${ok.length}</div><div class="sum-stat-l">✅ OK</div></div>
    <div class="sum-stat"><div class="sum-stat-n" style="color:var(--text-dim)">${pnd.length}</div><div class="sum-stat-l">⭕ Da fare</div></div>
  </div>`;

  h+=`<button class="btn-print-sum" onclick="printBottle()">🖨️ Stampa lista bottiglie A4</button>`;

  // BOTTIGLIE DA PORTARE
  if(btl.length>0){
    h+=`<div class="sum-card">
      <div class="sum-hdr h-bottle">💧 Portare bottiglia riempita — ${btl.length} ${btl.length===1?'camera':'camere'}</div>
      <div class="pills">`;
    btl.forEach(r=>{
      const ps=_pianoSt(r);
      const sub=ps?` <span style="font-size:.7rem;opacity:.8;">${PIANO_ICO[ps]}</span>`:'';
      h+=`<span class="pill pill-bottle">${r}${sub}</span>`;
    });
    h+=`</div></div>`;
  } else if(ROOMS.some(r=>{const s=_status(r);return s!=='pending'&&s!=='empty'&&s!=='dnd';})){
    h+=`<div class="sum-card"><div class="sum-hdr h-ok">💧 Nessuna bottiglia consumata — niente da portare ✅</div></div>`;
  }

  // NON DISTURBARE
  if(dnd.length>0){
    h+=`<div class="sum-card">
      <div class="sum-hdr h-dnd">🚫 Non Disturbare — da verificare più tardi (${dnd.length})</div>
      <div class="pills">`;
    dnd.forEach(r=>{
      const ps=_pianoSt(r);
      const sub=ps?` ${PIANO_ICO[ps]}`:'';
      h+=`<span class="pill pill-dnd">${r}${sub}</span>`;
    });
    h+=`</div></div>`;
  }

  // NON CONFORMITÀ
  if(wrn.length>0){
    h+=`<div class="sum-card">
      <div class="sum-hdr h-warn">⚠️ Non conformità — ${wrn.length}</div>
      <div class="warn-list">`;
    wrn.forEach(r=>{
      const rs=_state[r];const fail=[];
      CHECKS.forEach(s=>s.items.forEach(i=>{if(!rs.checks[i.id])fail.push(i.label);}));
      const ps=_pianoSt(r);
      h+=`<div class="warn-item">
        <div class="warn-room">${r}${ps?` <span style="font-size:.75rem;font-weight:400;color:var(--text-dim);">${PIANO_ICO[ps]} ${PIANO_LBL[ps]}</span>`:''}</div>
        <div class="warn-fail">${fail.join(' · ')}</div>
        ${rs.note?`<div class="warn-note">📝 ${rs.note}</div>`:''}
      </div>`;
    });
    h+=`</div></div>`;
  }

  if(pnd.length>0){
    h+=`<div class="sum-card">
      <div class="sum-hdr h-pend">⭕ Non ancora visitate — ${pnd.length}</div>
      <div class="pills">`;
    pnd.forEach(r=>{const ps=_pianoSt(r);h+=`<span class="pill pill-pend">${r}${ps?' '+PIANO_ICO[ps]:''}</span>`;});
    h+=`</div></div>`;
  }
  if(emp.length>0){
    h+=`<div class="sum-card">
      <div class="sum-hdr h-empty">🚪 Camere libere — ${emp.length}</div>
      <div class="pills">${emp.map(r=>`<span class="pill pill-empty">${r}</span>`).join('')}</div>
    </div>`;
  }
  if(ok.length>0){
    h+=`<div class="sum-card">
      <div class="sum-hdr h-ok">✅ Conformi, bottiglia piena — ${ok.length}</div>
      <div class="pills">${ok.map(r=>`<span class="pill pill-ok">${r}</span>`).join('')}</div>
    </div>`;
  }

  h+=`<button class="btn-reset" onclick="resetDay()">🗑 Reset giornata</button>`;
  document.getElementById('sum-body').innerHTML=h;
  _screen('s-summary');
}

function resetDay(){
  if(!confirm('Azzerare tutti i controlli di oggi?'))return;
  _state={};_persist();_loadPiano().then(()=>goHome());
}

// ── STAMPA A4 ────────────────────────
