<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#1c3a5e">
<title>Housekeeping — Compass QM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  color-scheme: light;
  --accent:#1c3a5e;
  --accent2:#2d5a8e;
  --gold:#c9952f;
  --green:#2e7d32;
  --amber:#e65100;
  --red:#c62828;
  --bg:#eef1f5;
  --surface:#f8f9fb;
  --surface2:#e8ecf1;
  --border:#cdd4de;
  --border-light:#dde2ea;
  --text:#0c1f33;
  --text-dim:#4a5568;
  --text-muted:#888;
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);
  --shadow-md:0 3px 10px rgba(0,0,0,.08);
  --shadow-lg:0 6px 20px rgba(0,0,0,.10);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}

/* Header */
.header{background:#1c3a5e;padding:16px 20px 14px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.2);border-bottom:2px solid #c9952f;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.header-title{font-size:18px;font-weight:700;color:#fff;}
.header-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px;}
.header-time{font-size:22px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;}
.header-date{font-size:11px;color:rgba(255,255,255,.7);text-align:right;margin-top:1px;}

/* Day navigator */
.day-nav{display:flex;align-items:center;gap:0;background:rgba(255,255,255,.18);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.2);}
.day-nav button{background:none;border:none;color:#fff;padding:8px 16px;font-size:20px;cursor:pointer;flex-shrink:0;transition:background .15s;}
.day-nav button:active{background:rgba(255,255,255,.15);}
.day-label-wrap{flex:1;text-align:center;padding:6px 0;}
.day-label-main{font-size:15px;font-weight:700;color:#fff;}
.day-label-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px;}

/* Content */
.content{padding:14px;}

/* Today badge */
.today-badge{background:#1c3a5e;color:#fff;font-size:10px;font-weight:700;border-radius:6px;padding:3px 9px;display:inline-block;margin-bottom:10px;letter-spacing:.06em;box-shadow:var(--shadow-sm);border-left:3px solid #c9952f;}

/* Structure section */
.struttura-title{font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.09em;margin:18px 0 9px;padding-left:10px;border-left:3px solid var(--gold);display:flex;align-items:center;gap:7px;}
.struttura-title:first-of-type{margin-top:0;}
.brand-logo{width:22px;height:22px;object-fit:contain;mix-blend-mode:multiply;flex-shrink:0;}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px;}
.kpi-card{background:var(--surface);border-radius:14px;padding:16px 12px;text-align:center;border:1px solid var(--border-light);box-shadow:var(--shadow-sm);}
.kpi-card.arrivi{border-top:3px solid var(--gold);background:var(--surface);}
.kpi-card.fermate{border-top:3px solid var(--gold);background:var(--surface);}
.kpi-card.partenze{border-top:3px solid var(--red);background:var(--surface);}
.kpi-icon{font-size:22px;margin-bottom:4px;line-height:1;}
.kpi-val{font-size:38px;font-weight:800;line-height:1;margin-bottom:5px;}
.kpi-val.arrivi{color:var(--accent);}
.kpi-val.fermate{color:var(--accent);}
.kpi-val.partenze{color:var(--red);}
.kpi-lbl{font-size:11px;color:var(--text-dim);letter-spacing:.04em;font-weight:500;}

/* No data */
.no-data{background:var(--surface);border-radius:14px;padding:24px;text-align:center;color:var(--text-dim);font-size:14px;border:1px solid var(--border);box-shadow:var(--shadow-sm);}
.no-data-icon{font-size:32px;margin-bottom:8px;}

/* Totale giorno */
.day-total{background:var(--surface);border-radius:14px;padding:16px;margin-top:8px;border:1px solid var(--border);border-top:3px solid var(--gold);box-shadow:var(--shadow-md);}
.day-total-title{font-size:10px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px;}
.day-total-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.day-total-item{background:rgba(255,255,255,.8);border-radius:10px;padding:11px 8px;text-align:center;border:1px solid rgba(0,53,128,.08);}
.day-total-val{font-size:28px;font-weight:800;line-height:1;margin-bottom:3px;color:var(--accent);}
.day-total-lbl{font-size:10px;color:var(--text-dim);letter-spacing:.04em;}

/* Loading */
.loading{text-align:center;padding:60px 20px;color:var(--text-dim);}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Preview giorni successivi */
.preview-section{margin-top:14px;}
.preview-title{font-size:10px;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.09em;margin:18px 0 8px;}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.preview-card{background:var(--surface);border-radius:14px;padding:12px 14px;border:1px solid var(--border-light);margin-bottom:8px;box-shadow:var(--shadow-sm);}
.preview-day{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;}
.preview-day-label{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;}
.preview-struttura{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.preview-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px;}
.preview-row .lbl{color:var(--text-dim);}
.preview-row .val{font-weight:700;}
.preview-row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.preview-item{background:var(--surface2);border-radius:8px;padding:8px 6px;text-align:center;border:1px solid var(--border-light);}
.preview-val{font-size:20px;font-weight:700;line-height:1;margin-bottom:2px;}
.preview-lbl{font-size:10px;color:var(--text-dim);}

/* Timestamp */
.update-ts{background:var(--surface2);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-top:12px;font-size:11px;color:var(--text-dim);}
.update-ts-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;}

/* Refresh btn */
.refresh-row{text-align:center;padding:16px 0 28px;font-size:12px;color:var(--text-dim);}
.refresh-row a{color:var(--accent);text-decoration:none;font-weight:600;}

/* Room detail card */
.room-detail-card{background:var(--surface);border-radius:14px;padding:12px 14px;margin-top:8px;border:1px solid var(--border-light);box-shadow:var(--shadow-sm);}
.room-section{margin-top:6px;}
.room-section:first-child{margin-top:0;}
.room-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:6px 0 5px;display:flex;align-items:center;gap:5px;}
.room-section-title.partenza{color:var(--red);}
.room-section-title.arrivo{color:var(--green);}
.room-section-title.doppio{color:var(--amber);}
.room-section-title.fermata{color:var(--accent);opacity:.75;}
.room-chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.chip.partenza{background:rgba(220,38,38,.10);color:var(--red);border:1px solid rgba(220,38,38,.18);}
.chip.arrivo{background:rgba(26,127,90,.10);color:var(--green);border:1px solid rgba(26,127,90,.18);}
.chip.doppio{background:rgba(180,83,9,.10);color:var(--amber);border:1px solid rgba(180,83,9,.18);}
.chip.fermata{background:rgba(0,53,128,.07);color:var(--accent);border:1px solid rgba(0,53,128,.12);}

/* Per-housekeeper stats */
.hk-stats-box{background:var(--surface);border-radius:12px;padding:10px 14px;margin:6px 0 10px;border:1px solid var(--border);border-top:3px solid var(--gold);box-shadow:var(--shadow-sm);}
.hk-stat-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border-light);}
.hk-stat-row:last-child{border-bottom:none;padding-bottom:0;}
.hk-stat-row:first-child{padding-top:0;}
.hk-stat-name{flex:1;font-size:12px;font-weight:700;color:var(--text);}
.hk-stat-chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;white-space:nowrap;}
.hk-stat-chip.part{background:rgba(220,38,38,.10);color:var(--red);border:1px solid rgba(220,38,38,.18);}
.hk-stat-chip.ferm{background:rgba(0,53,128,.07);color:var(--accent);border:1px solid rgba(0,53,128,.14);}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div style="display:flex;align-items:center;gap:10px;">
      <svg viewBox="0 0 36 36" width="32" height="32" style="flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><polygon points="18,1 21,13 27,9 23,15 35,18 23,21 27,27 21,23 18,35 15,23 9,27 13,21 1,18 13,15 9,9 15,13" fill="#c9952f"/><polygon points="18,6 20,14 18,12 16,14" fill="rgba(255,255,255,.5)"/><polygon points="18,30 16,22 18,24 20,22" fill="rgba(255,255,255,.25)"/></svg>
      <div>
        <div class="header-title">Housekeeping</div>
        <div class="header-sub">Compass QM · SoulArt · Boutique</div>
        <div id="hDataTs" style="font-size:10px;color:rgba(255,255,255,.55);margin-top:3px;"></div>
      </div>
    </div>
    <div style="text-align:right;">
      <div class="header-time" id="hTime">--:--</div>
      <div class="header-date" id="hDate">—</div>
    </div>
  </div>
  <div class="day-nav">
    <button onclick="changeDay(-1)">‹</button>
    <div class="day-label-wrap">
      <div class="day-label-main" id="navDayMain">—</div>
      <div class="day-label-sub" id="navDaySub">—</div>
    </div>
    <button onclick="changeDay(1)">›</button>
  </div>
</div>

<div class="content" id="mainContent">
  <div class="loading">
    <div class="spinner"></div>
    Caricamento dati...
  </div>
</div>

<script>
(function(){
  const V='20260510';
  const urlV=new URLSearchParams(location.search).get('v');
  if(urlV!==V) location.replace(location.href.split('?')[0]+'?v='+V);
})();
</script>
<script>
const PROXY='https://anthropic-proxy.qm-d82.workers.dev';
const GIORNI_FULL=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const GIORNI_SHORT=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MESI=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];

let soulData=null;
let boutData=null;
let pianoData=null;
let currentIdx=0;
let allDays=[];

const GG_SHORT=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MM_SHORT=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
function fmtDataTs(ts){
  if(!ts)return null;
  const d=new Date(ts);
  return GG_SHORT[d.getDay()]+' '+d.getDate()+' '+MM_SHORT[d.getMonth()]+' · '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

// Clock
function tick(){
  const n=new Date();
  document.getElementById('hTime').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('hDate').textContent=GIORNI_FULL[n.getDay()]+' '+n.getDate()+' '+MESI[n.getMonth()];
}
tick();setInterval(tick,10000);

async function fetchKV(key){
  try{
    const res=await fetch(PROXY+'/kv/get?key=qm_hk_'+encodeURIComponent(key));
    const json=await res.json();
    return json.value?JSON.parse(json.value):null;
  }catch(e){return null;}
}
async function fetchKVRaw(key){
  try{
    const res=await fetch(PROXY+'/kv/get?key='+encodeURIComponent(key));
    const json=await res.json();
    return json.value?JSON.parse(json.value):null;
  }catch(e){return null;}
}
function sameDate(d1,d2){
  if(!d1||!d2)return false;
  const norm=s=>s.split('/').map((p,i)=>i<2?p.padStart(2,'0'):p).join('/');
  return norm(d1)===norm(d2);
}
const MATARESE=new Set(['Art 1','Art 2','Art 3','Art 4','Art 5','Art 6','Art 7','Art 10','Art 11','Art 12','Art 22']);
let _arriviBooking = new Set(); // camere Booking.com oggi (arrivi + fermate + partenze)

async function _loadArriviBooking(){
  try{
    const r=await fetch(PROXY+'/kv/get?key=qm_arriviData');
    if(!r.ok)return;
    const j=await r.json();
    if(!j||!j.value)return;
    const ad=JSON.parse(j.value);
    if(!ad)return;
    const norm=s=>String(s||'').replace(/\s+/g,'').toLowerCase();
    const isBooking=x=>/booking/i.test(x.origine||'');
    (ad.arrivi||[]).forEach(a=>{ if(isBooking(a)) _arriviBooking.add(norm(a.camera)); });
    (ad.fermate||[]).forEach(f=>{ if(isBooking(f)) _arriviBooking.add(norm(f.camera)); });
    (ad.partenze||[]).forEach(p=>{ if(isBooking(p)) _arriviBooking.add(norm(p.camera)); });
  }catch(e){}
}
function splitSoulart(rooms){
  const m={partenze:[],fermate:[],cambi:[]},a={partenze:[],fermate:[],cambi:[]};
  if(!rooms)return{m,a};
  (rooms.cambi||[]).forEach(r=>(MATARESE.has(r)?m:a).cambi.push(r));
  (rooms.partenze||[]).forEach(r=>(MATARESE.has(r)?m:a).partenze.push(r));
  (rooms.fermate||[]).forEach(r=>(MATARESE.has(r)?m:a).fermate.push(r));
  return{m,a};
}
function roomSort(arr){return[...arr].sort((a,b)=>{const na=parseInt(a.replace(/\D/g,''))||0,nb=parseInt(b.replace(/\D/g,''))||0;return na-nb;});}
function renderRoomDetail(rooms,label){
  if(!rooms)return'';
  const cambi=rooms.cambi||[],partenze=rooms.partenze||[],fermate=rooms.fermate||[];
  const tuttePartenze=[...cambi,...partenze];
  const hasData=tuttePartenze.length||fermate.length;
  if(!hasData)return'';
  let h=label?`<div style="font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 4px;padding-top:6px;border-top:1px solid var(--border);">🧹 ${label}</div>`:'';
  const normCam=s=>String(s||'').replace(/\s+/g,'').toLowerCase();
  if(tuttePartenze.length)h+=`<div class="room-section"><div class="room-section-title partenza" style="display:flex;align-items:center;gap:6px;">🛫 Partenze${cambi.length?`<span style="font-size:13px;font-weight:500;color:var(--text-muted);text-transform:none;letter-spacing:0;"><span style="font-weight:800;color:var(--red);">⇄</span> = partenza con arrivo</span>`:''}</div><div class="room-chips">${roomSort(tuttePartenze).map(r=>{const isCambio=cambi.includes(r);const isBk=_arriviBooking.has(normCam(r));return`<span class="chip ${isCambio?'doppio':'partenza'}">${r}${isCambio?` <span style="font-weight:800;font-size:1.1em;color:var(--red);">⇄</span>`:''}${isBk?' <span style="font-size:9px;background:#2563EB;color:#fff;border-radius:4px;padding:1px 4px;font-weight:700;">B</span>':''}</span>`;}).join('')}</div></div>`;
  if(fermate.length)h+=`<div class="room-section"><div class="room-section-title fermata">🛏 Fermate</div><div class="room-chips">${roomSort(fermate).map(r=>{const isBk=_arriviBooking.has(normCam(r));return`<span class="chip fermata">${r}${isBk?' <span style="font-size:9px;background:#2563EB;color:#fff;border-radius:4px;padding:1px 4px;font-weight:700;">B</span>':''}</span>`;}).join('')}</div></div>`;
  return h;
}

function parseDate(str){
  // "23/03/2026" → Date
  if(!str)return null;
  const p=str.split('/');
  if(p.length===3)return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]),12,0,0);
  return null;
}

function buildAllDays(){
  // Unisci tutti i giorni unici da soul e bout
  const map={};
  [soulData,boutData].forEach(ds=>{
    if(!ds||!ds.giorni)return;
    ds.giorni.forEach(g=>{
      if(!map[g.data])map[g.data]={data:g.data,label:g.label};
    });
  });
  allDays=Object.values(map).sort((a,b)=>{
    const da=parseDate(a.data),db=parseDate(b.data);
    return da-db;
  });
}

function findTodayIdx(){
  const today=new Date();today.setHours(0,0,0,0);
  let idx=allDays.findIndex(d=>{
    const dd=parseDate(d.data);
    if(!dd)return false;
    dd.setHours(0,0,0,0);
    return dd.getTime()===today.getTime();
  });
  if(idx===-1){
    // Trova il giorno più vicino nel futuro o l'ultimo
    const now=new Date();now.setHours(0,0,0,0);
    idx=allDays.findIndex(d=>{const dd=parseDate(d.data);dd&&dd.setHours(0,0,0,0);return dd>=now;});
    if(idx===-1)idx=allDays.length-1;
  }
  return Math.max(0,idx);
}

function changeDay(dir){
  currentIdx=Math.max(0,Math.min(allDays.length-1,currentIdx+dir));
  // Salva in sessionStorage
  try{sessionStorage.setItem('hk_day_idx',currentIdx);}catch(e){}
  renderDay();
}

function renderDay(){
  if(!allDays.length){
    document.getElementById('mainContent').innerHTML=`
      <div class="no-data"><div class="no-data-icon">📋</div>Nessun dato disponibile.<br>Il responsabile non ha ancora caricato i report.</div>`;
    return;
  }
  const day=allDays[currentIdx];
  const today=new Date();today.setHours(0,0,0,0);
  const dayDate=parseDate(day.data);dayDate&&dayDate.setHours(0,0,0,0);
  const isToday=dayDate&&dayDate.getTime()===today.getTime();
  const isPast=dayDate&&dayDate<today;

  // Aggiorna navigatore
  document.getElementById('navDayMain').textContent=day.label;
  document.getElementById('navDaySub').textContent=isToday?'Oggi':isPast?'Passato':'Prossimo';

  // Timestamp nell'header
  const sTs=fmtDataTs(soulData&&soulData._ts);
  const bTs=fmtDataTs(boutData&&boutData._ts);
  const tsEl=document.getElementById('hDataTs');
  if(tsEl){
    const parts=[];
    if(sTs)parts.push('SA: '+sTs);
    if(bTs)parts.push('BH: '+bTs);
    tsEl.textContent=parts.length?'↑ '+parts.join(' · '):'';
  }
  let html='';
  if(isToday)html+=`<div class="today-badge">📅 OGGI</div>`;

  let totArrivi=0,totFermate=0,totPartenze=0;
  const pianoDay=pianoData&&pianoData.giorni?pianoData.giorni.find(g=>sameDate(g.data,day.data)):null;

  // SoulArt
  const soulDay=soulData?.giorni?.find(g=>sameDate(g.data,day.data));
  html+=`<div class="struttura-title"><img src="img/logo-soulart.png" class="brand-logo" alt="SoulArt">SoulArt Hotel</div>`;
  if(soulDay){
    totArrivi+=soulDay.arrivi;totFermate+=soulDay.fermate;totPartenze+=soulDay.partenze;
    html+=renderKpi(soulDay);
  } else {
    html+=`<div class="no-data" style="padding:16px;font-size:13px;">Nessun dato per questo giorno</div>`;
  }
  if(pianoDay){
    const{m,a}=splitSoulart(pianoDay.soulart);
    const mPart=(m.cambi||[]).length+(m.partenze||[]).length,mFerm=(m.fermate||[]).length;
    const aPart=(a.cambi||[]).length+(a.partenze||[]).length,aFerm=(a.fermate||[]).length;
    if(mPart+mFerm+aPart+aFerm>0){
      html+=`<div class="hk-stats-box">`;
      if(mPart+mFerm>0)html+=`<div class="hk-stat-row"><span class="hk-stat-name">Matarese</span><span class="hk-stat-chip part">🛫 ${mPart} partenze</span><span class="hk-stat-chip ferm">🛏 ${mFerm} fermate</span></div>`;
      if(aPart+aFerm>0)html+=`<div class="hk-stat-row"><span class="hk-stat-name">Altre housekeeper</span><span class="hk-stat-chip part">🛫 ${aPart} partenze</span><span class="hk-stat-chip ferm">🛏 ${aFerm} fermate</span></div>`;
      html+=`</div>`;
    }
    const rd=renderRoomDetail(m,'Matarese')+renderRoomDetail(a,'Altre housekeeper');
    if(rd)html+=`<div class="room-detail-card">${rd}</div>`;
  }

  // Boutique
  const boutDay=boutData?.giorni?.find(g=>sameDate(g.data,day.data));
  const libPiano=pianoDay?(pianoDay.liborio||{partenze:[],fermate:[],cambi:[]}):{partenze:[],fermate:[],cambi:[]};
  const libPartenze=libPiano.partenze.length+libPiano.cambi.length,libFermate=libPiano.fermate.length;
  html+=`<div class="struttura-title"><img src="img/logo-boutique.png" class="brand-logo" alt="Boutique">Boutique Hotel - San Liborio</div>`;
  if(boutDay){
    const boutAdj={fermate:boutDay.fermate+libFermate,partenze:boutDay.partenze+libPartenze,arrivi:boutDay.arrivi};
    totArrivi+=boutDay.arrivi;totFermate+=boutAdj.fermate;totPartenze+=boutAdj.partenze;
    html+=renderKpi(boutAdj);
  } else {
    html+=`<div class="no-data" style="padding:16px;font-size:13px;">Nessun dato per questo giorno</div>`;
  }
  if(pianoDay){
    const boutC=[...(pianoDay.boutique?.cambi||[]),...libPiano.cambi];
    const boutP=[...(pianoDay.boutique?.partenze||[]),...libPiano.partenze];
    const boutF=[...(pianoDay.boutique?.fermate||[]),...libPiano.fermate];
    const bPart=boutC.length+boutP.length,bFerm=boutF.length;
    if(bPart+bFerm>0){
      html+=`<div class="hk-stats-box"><div class="hk-stat-row"><span class="hk-stat-name">Boutique · San Liborio</span><span class="hk-stat-chip part">🛫 ${bPart} partenze</span><span class="hk-stat-chip ferm">🛏 ${bFerm} fermate</span></div></div>`;
    }
    const boutMerged={partenze:boutP,fermate:boutF,cambi:boutC};
    const rdB=renderRoomDetail(boutMerged,'');
    if(rdB)html+=`<div class="room-detail-card">${rdB}</div>`;
  }

  // Totale giorno se entrambe le strutture hanno dati
  if(soulDay&&boutDay){
    html+=`<div class="day-total">
      <div class="day-total-title">Totale giorno — entrambe le strutture</div>
      <div class="day-total-grid" style="grid-template-columns:1fr 1fr;">
        <div class="day-total-item">
          <div class="day-total-val" style="color:var(--accent);">${totFermate}</div>
          <div class="day-total-lbl">🛏 Fermate</div>
        </div>
        <div class="day-total-item">
          <div class="day-total-val" style="color:var(--accent);">${totPartenze}</div>
          <div class="day-total-lbl">🛫 Partenze</div>
        </div>
      </div>
    </div>`;
  }

  // Preview prossimi 2 giorni
  const nextDays=allDays.slice(currentIdx+1,currentIdx+3);
  if(nextDays.length){
    html+=`<div class="preview-title">Prossimi giorni</div>`;
    nextDays.forEach(nd=>{
      const sd=soulData&&soulData.giorni?soulData.giorni.find(g=>g.data===nd.data):null;
      const bd=boutData&&boutData.giorni?boutData.giorni.find(g=>g.data===nd.data):null;
      html+=`<div class="preview-card"><div class="preview-day">${nd.label}</div>`;
      // SoulArt
      html+=`<div class="preview-struttura"><img src="img/logo-soulart.png" class="brand-logo" alt="SoulArt">SoulArt Hotel</div>`;
      if(sd){
        const t=sd.fermate+sd.partenze;
        html+=`<div class="preview-row-3">
          <div class="preview-item"><div class="preview-val" style="color:var(--accent);">${sd.fermate}</div><div class="preview-lbl">🛏 Fermate</div></div>
          <div class="preview-item"><div class="preview-val" style="color:var(--accent);">${sd.partenze}</div><div class="preview-lbl">🛫 Partenze</div></div>
          <div class="preview-item"><div class="preview-val" style="color:var(--accent);">${t}</div><div class="preview-lbl">Totale</div></div>
        </div>`;
      } else {
        html+=`<div style="font-size:12px;color:var(--text-dim);padding:4px 0 6px;">Nessun dato</div>`;
      }
      // Boutique
      html+=`<div class="preview-struttura" style="margin-top:8px;"><img src="img/logo-boutique.png" class="brand-logo" alt="Boutique">Boutique Hotel - San Liborio</div>`;
      if(bd){
        const t=bd.fermate+bd.partenze;
        html+=`<div class="preview-row-3">
          <div class="preview-item"><div class="preview-val" style="color:var(--accent);">${bd.fermate}</div><div class="preview-lbl">🛏 Fermate</div></div>
          <div class="preview-item"><div class="preview-val" style="color:var(--accent);">${bd.partenze}</div><div class="preview-lbl">🛫 Partenze</div></div>
          <div class="preview-item"><div class="preview-val" style="color:var(--accent);">${t}</div><div class="preview-lbl">Totale</div></div>
        </div>`;
      } else {
        html+=`<div style="font-size:12px;color:var(--text-dim);padding:4px 0;">Nessun dato</div>`;
      }
      html+=`</div>`;
    });
  }

  html+=`<div class="refresh-row"><a href="javascript:loadAll()">↻ Aggiorna ora</a></div>`;

  document.getElementById('mainContent').innerHTML=html;
}

function renderKpi(d){
  return`<div class="kpi-grid" style="grid-template-columns:1fr 1fr;">
    <div class="kpi-card fermate">
      <div class="kpi-icon">🛏</div>
      <div class="kpi-val fermate">${d.fermate}</div>
      <div class="kpi-lbl">Fermate</div>
    </div>
    <div class="kpi-card partenze">
      <div class="kpi-icon">🛫</div>
      <div class="kpi-val partenze">${d.partenze}</div>
      <div class="kpi-lbl">Partenze</div>
    </div>
  </div>`;
}

async function loadAll(){
  document.getElementById('mainContent').innerHTML=`<div class="loading"><div class="spinner"></div>Caricamento...</div>`;
  [soulData,boutData,pianoData]=await Promise.all([fetchKV('soul'),fetchKV('bout'),fetchKVRaw('qm_piano')]);
  await _loadArriviBooking();
  // Salva in localStorage per persistenza
  try{if(soulData)localStorage.setItem('hk_soul_cache',JSON.stringify(soulData));}catch(e){}
  try{if(boutData)localStorage.setItem('hk_bout_cache',JSON.stringify(boutData));}catch(e){}
  try{if(pianoData)localStorage.setItem('hk_piano_cache',JSON.stringify(pianoData));}catch(e){}
  buildAllDays();
  // Ripristina giorno selezionato o vai a oggi
  try{
    const saved=sessionStorage.getItem('hk_day_idx');
    currentIdx=saved!==null?Math.min(parseInt(saved),allDays.length-1):findTodayIdx();
  }catch(e){currentIdx=findTodayIdx();}
  renderDay();
}

// Carica prima da cache locale poi aggiorna dal cloud
try{
  const sc=localStorage.getItem('hk_soul_cache');
  const bc=localStorage.getItem('hk_bout_cache');
  const pc=localStorage.getItem('hk_piano_cache');
  if(sc)soulData=JSON.parse(sc);
  if(bc)boutData=JSON.parse(bc);
  if(pc)pianoData=JSON.parse(pc);
  if(soulData||boutData){
    buildAllDays();
    try{
      const saved=sessionStorage.getItem('hk_day_idx');
      currentIdx=saved!==null?Math.min(parseInt(saved),allDays.length-1):findTodayIdx();
    }catch(e){currentIdx=findTodayIdx();}
    renderDay();
  }
}catch(e){}
// Poi aggiorna dal cloud in background
loadAll();
// Auto-refresh ogni 10 minuti
setInterval(loadAll,10*60*1000);
// Contatore accessi
(async function trackAccess(){
  try{
    if(location.search.includes('notrack')){localStorage.setItem('qm_no_track','1');return;}
    if(localStorage.getItem('qm_no_track')==='1'||localStorage.getItem('hk_no_track')==='1')return;

    // UUID dispositivo — generato una volta e persistito in localStorage
    let devId=localStorage.getItem('hk_device_id');
    if(!devId){devId='dev_'+Math.random().toString(36).slice(2,10)+'_'+Date.now().toString(36);localStorage.setItem('hk_device_id',devId);}

    const todayStr=new Date().toISOString().slice(0,10);
    const nowIso=new Date().toISOString();

    const res=await fetch(PROXY+'/kv/get?key=qm_hk_access');
    const json=await res.json();
    const d=json.value?JSON.parse(json.value):{total:0,today:0,todayDate:'',last:null,devices:{}};

    // Totali globali
    d.total=(d.total||0)+1;
    d.today=d.todayDate===todayStr?(d.today||0)+1:1;
    d.todayDate=todayStr;
    d.last=nowIso;
    if(!d.devices)d.devices={};

    // Totali per dispositivo
    const dev=d.devices[devId]||{firstSeen:nowIso,total:0,today:0,todayDate:'',last:null};
    dev.total=(dev.total||0)+1;
    dev.today=dev.todayDate===todayStr?(dev.today||0)+1:1;
    dev.todayDate=todayStr;
    dev.last=nowIso;
    d.devices[devId]=dev;

    await fetch(PROXY+'/kv/set',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:'qm_hk_access',value:JSON.stringify(d)})});
  }catch(e){}
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw-housekeeper.js').then(reg => {
    // Controlla aggiornamenti ad ogni apertura
    reg.update();
    // Quando il nuovo SW è pronto, ricarica la pagina automaticamente
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'activated') location.reload();
      });
    });
  }).catch(() => {});
}
</script>
