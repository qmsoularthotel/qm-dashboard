<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1c3a5e">
<title>Breakfast — Compass QM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --accent:#1c3a5e;
  --gold:#c9952f;
  --green:#2e7d32;
  --amber:#e65100;
  --red:#c62828;
  --bg:#eef1f5;
  --surface:#f8f9fb;
  --surface2:#e8ecf1;
  --border:#cdd4de;
  --text:#0c1f33;
  --text-dim:#4a5568;
  --text-muted:#888;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}

.header{background:#1c3a5e;padding:16px 20px 14px;position:sticky;top:0;z-index:10;border-bottom:2px solid #c9952f;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.header-title{font-size:18px;font-weight:700;color:#fff;}
.header-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px;}
.header-time{font-size:22px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;}
.header-date{font-size:11px;color:rgba(255,255,255,.7);text-align:right;margin-top:1px;}

.day-nav{display:flex;align-items:center;gap:0;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden;}
.day-nav button{background:none;border:none;color:#fff;padding:7px 14px;font-size:20px;cursor:pointer;flex-shrink:0;opacity:.8;}
.day-nav button:active{opacity:.5;}
.day-label-wrap{flex:1;text-align:center;}
.day-label-main{font-size:15px;font-weight:700;color:#fff;}
.day-label-sub{font-size:11px;color:rgba(255,255,255,.7);}

.content{padding:14px;}

.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px;}
.kpi-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.kpi-card{background:var(--surface);border-radius:12px;padding:14px 12px;text-align:center;border:1px solid var(--border);}
.kpi-card.main{border-top:3px solid var(--gold);grid-column:span 2;}
.kpi-val{font-size:42px;font-weight:700;line-height:1;margin-bottom:4px;color:var(--accent);}
.kpi-val.sm{font-size:28px;}
.kpi-lbl{font-size:11px;color:var(--text-dim);letter-spacing:.04em;}

.no-data{background:var(--surface);border-radius:12px;padding:32px 24px;text-align:center;color:var(--text-dim);font-size:14px;border:1px solid var(--border);}

.section-title{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;padding-left:2px;}

.preview-card{background:var(--surface);border-radius:12px;padding:12px 14px;border:1px solid var(--border);margin-bottom:8px;}
.preview-day{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;}
.preview-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.preview-item{background:var(--surface2);border-radius:7px;padding:7px 6px;text-align:center;}
.preview-val{font-size:18px;font-weight:700;line-height:1;margin-bottom:2px;color:var(--accent);}
.preview-val.muted{color:var(--text-muted);}
.preview-lbl{font-size:10px;color:var(--text-dim);}

.loading{text-align:center;padding:60px 20px;color:var(--text-dim);}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

.refresh-row{text-align:center;padding:16px 0 28px;font-size:12px;color:var(--text-dim);}
.refresh-row a{color:var(--accent);text-decoration:none;font-weight:500;}

.update-ts{background:var(--surface2);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:11px;color:var(--text-dim);}
.update-ts-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1c3a5e;border-top:2px solid #c9952f;display:flex;z-index:20;}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 10px;cursor:pointer;font-size:10px;font-weight:600;color:rgba(255,255,255,.45);gap:3px;letter-spacing:.03em;text-transform:uppercase;}
.bottom-nav-item.active{color:#c9952f;}
.bottom-nav-item span{font-size:20px;display:block;filter:brightness(0) invert(1);opacity:.5;}
.bottom-nav-item.active span{filter:none;opacity:1;}
body{padding-bottom:62px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div style="display:flex;align-items:center;gap:10px;">
      <svg viewBox="0 0 36 36" width="32" height="32" style="flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><polygon points="18,1 21,13 27,9 23,15 35,18 23,21 27,27 21,23 18,35 15,23 9,27 13,21 1,18 13,15 9,9 15,13" fill="#c9952f"/><polygon points="18,6 20,14 18,12 16,14" fill="rgba(255,255,255,.5)"/><polygon points="18,30 16,22 18,24 20,22" fill="rgba(255,255,255,.25)"/></svg>
      <div>
        <div class="header-title">Breakfast</div>
        <div class="header-sub">Compass QM · SoulArt Hotel</div>
        <div id="hDataTs" style="font-size:10px;color:rgba(255,255,255,.55);margin-top:3px;"></div>
      </div>
    </div>
    <div style="text-align:right;">
      <div class="header-time" id="hTime">--:--</div>
      <div class="header-date" id="hDate">—</div>
    </div>
  </div>
  <div class="day-nav">
    <button onclick="changeDay(-1)">‹</button>
    <div class="day-label-wrap">
      <div class="day-label-main" id="navDayMain">—</div>
      <div class="day-label-sub" id="navDaySub">—</div>
    </div>
    <button onclick="changeDay(1)">›</button>
  </div>
</div>

<div class="content" id="mainContent">
  <div class="loading">
    <div class="spinner"></div>
    Caricamento dati...
  </div>
</div>

<div id="ordiniContent" style="display:none;padding:14px;"></div>

<nav class="bottom-nav">
  <div class="bottom-nav-item active" id="bnv-day" onclick="switchTab('day')">
    <span>☕</span>Servizio
  </div>
  <div class="bottom-nav-item" id="bnv-orders" onclick="switchTab('orders')">
    <span>🛒</span>Acquisti
  </div>
</nav>

<script>
const PROXY='https://anthropic-proxy.qm-d82.workers.dev';
const GIORNI=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const GIORNI_S=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MESI=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];

let bkfData=null;
let currentIdx=0;
let bkfGroups=[];
let _bkfHistory={};
const BKF_HIST_KEY='qm_bkf_monthly_history';

// Orologio e data
function tick(){
  const n=new Date();
  document.getElementById('hTime').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('hDate').textContent=GIORNI[n.getDay()]+' '+n.getDate()+' '+MESI[n.getMonth()];
}
tick();setInterval(tick,10000);

function parseDate(str){
  if(!str)return null;
  const p=str.split('/');
  if(p.length===3)return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]),12,0,0);
  // YYYY-MM-DD (formato input date da app.js)
  const q=str.split('-');
  if(q.length===3)return new Date(parseInt(q[0]),parseInt(q[1])-1,parseInt(q[2]),12,0,0);
  return null;
}

function findTodayIdx(){
  const today=new Date();today.setHours(0,0,0,0);
  let idx=bkfData.findIndex(d=>{const dd=parseDate(d.data);if(!dd)return false;dd.setHours(0,0,0,0);return dd.getTime()===today.getTime();});
  if(idx===-1){
    const now=new Date();now.setHours(0,0,0,0);
    idx=bkfData.findIndex(d=>{const dd=parseDate(d.data);if(!dd)return false;dd.setHours(0,0,0,0);return dd>=now;});
    if(idx===-1)idx=bkfData.length-1;
  }
  return Math.max(0,idx);
}

function changeDay(dir){
  currentIdx=Math.max(0,Math.min(bkfData.length-1,currentIdx+dir));
  try{sessionStorage.setItem('bkf_day_idx',currentIdx);}catch(e){}
  renderDay();
}

function renderDay(){
  if(!bkfData||!bkfData.length){
    document.getElementById('mainContent').innerHTML='<div class="no-data">Nessun dato disponibile</div>';
    return;
  }
  const d=bkfData[currentIdx];
  const coperti=(d.adulti||0)+(d.bambini||0);
  const ddRef=parseDate(d.data);
  const paxGruppi=(bkfGroups||[]).filter(g=>{
    const a=parseDate(g.arrivo||g.data);const p=parseDate(g.partenza||g.arrivo||g.data);
    if(!a||!ddRef)return false;
    a.setHours(0,0,0,0);if(p)p.setHours(0,0,0,0);ddRef.setHours(0,0,0,0);
    return ddRef>=a&&ddRef<=(p||a);
  }).reduce((s,g)=>s+(g.pax||0),0);
  const today=new Date();today.setHours(0,0,0,0);
  const dd=parseDate(d.data);
  const isToday=dd&&(dd.setHours(0,0,0,0),dd.getTime()===today.getTime());

  // Header nav
  document.getElementById('navDayMain').textContent=d.label||'—';
  document.getElementById('navDaySub').textContent=isToday?'Oggi':'';

  // Aggiorna timestamp header
  const tsEl=document.getElementById('hDataTs');
  if(tsEl&&bkfData._ts){const dt=new Date(bkfData._ts);tsEl.textContent='Aggiornato '+dt.getDate()+' '+MESI[dt.getMonth()]+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');}

  let html='';

  // KPI principale
  html+=`<div class="kpi-grid" style="grid-template-columns:1fr;margin-bottom:10px;">
    <div class="kpi-card" style="border-top:3px solid var(--accent);">
      <div class="kpi-lbl" style="margin-bottom:6px;">Coperti totali</div>
      <div class="kpi-val">${coperti}</div>
    </div>
  </div>`;

  // KPI dettaglio
  html+=`<div class="kpi-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:10px;">
    <div class="kpi-card">
      <div class="kpi-val sm">${coperti}</div>
      <div class="kpi-lbl">BB</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val sm" style="color:var(--text-muted);">${d.noCol||0}</div>
      <div class="kpi-lbl">RO</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val sm" style="color:var(--green);">${paxGruppi||0}</div>
      <div class="kpi-lbl">Pax Gruppi</div>
    </div>
  </div>`;

  // Grafico settimanale
  html+=`<div style="background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:12px 14px;margin-bottom:10px;" id="bkf-chart-wrap"></div>`;

  // Domani
  const tomorrow=bkfData[currentIdx+1];
  if(tomorrow){
    const totTom=(tomorrow.adulti||0)+(tomorrow.bambini||0);
    html+=`<div class="section-title">Domani</div>
    <div class="preview-card">
      <div class="preview-day">${tomorrow.label}</div>
      <div class="preview-row" style="grid-template-columns:1fr 1fr;">
        <div class="preview-item"><div class="preview-val">${totTom}</div><div class="preview-lbl">BB</div></div>
        <div class="preview-item"><div class="preview-val muted">${tomorrow.noCol||0}</div><div class="preview-lbl">RO</div></div>
      </div>
    </div>`;
  }

  // Gruppi colazione
  if(bkfGroups&&bkfGroups.length){
    const today2=new Date();today2.setHours(0,0,0,0);
    const fmt=s=>{if(!s)return'—';const p=s.split('-');return p.length===3?p[2]+'/'+p[1]:s;};
    html+=`<div class="section-title">Gruppi colazione</div><div style="background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px;">`;
    bkfGroups.forEach((g,i)=>{
      const a=parseDate(g.arrivo||g.data);const p=parseDate(g.partenza||g.arrivo||g.data);
      if(a)a.setHours(0,0,0,0);if(p)p.setHours(0,0,0,0);
      const isActive=a&&p&&today2>=a&&today2<=p;
      const isPast=p&&p<today2;
      const isFuture=a&&a>today2;
      const badge=isActive
        ?`<span style="background:var(--accent);color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;">IN CASA</span>`
        :isFuture
        ?`<span style="background:var(--surface2);color:var(--accent);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:11px;">arr. ${fmt(g.arrivo||g.data)}</span>`
        :`<span style="background:var(--surface2);color:var(--text-muted);border-radius:4px;padding:2px 8px;font-size:11px;">partito</span>`;
      html+=`<div style="padding:12px 14px;${i>0?'border-top:1px solid var(--border);':''}${isPast?'opacity:.45;':''}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;">
          <span style="font-size:15px;font-weight:700;color:var(--text);">${g.nome}</span>${badge}
        </div>
        <div style="display:flex;gap:14px;font-size:13px;color:var(--text-dim);flex-wrap:wrap;">
          <span>📅 ${fmt(g.arrivo||g.data)} → ${fmt(g.partenza||g.arrivo||g.data)}</span>
          <span style="font-weight:700;color:var(--text);">👥 ${g.pax} persone</span>
          ${g.orario?`<span style="color:var(--amber);">🕐 ${g.orario}</span>`:''}
        </div>
        ${g.note?`<div style="font-size:12px;color:var(--text-muted);font-style:italic;margin-top:4px;">${g.note}</div>`:''}
      </div>`;
    });
    html+=`</div>`;
  }

  // Storico mensile
  html+=renderMonthlyStats();

  html+=`<div class="refresh-row"><a href="javascript:loadAll()">↻ Aggiorna ora</a></div>`;
  document.getElementById('mainContent').innerHTML=html;
  renderChart();
}

let _bkfViewMonth='';
function bkfMonthNav(dir){
  const today=new Date();
  const curYM=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0');
  const base=_bkfViewMonth||curYM;
  const[y,m]=base.split('-').map(Number);
  const d=new Date(y,m-1+dir,1);
  const newYM=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  if(newYM>curYM)return;
  _bkfViewMonth=newYM;
  const el=document.getElementById('bkf-monthly-wrap');
  if(el)el.outerHTML=renderMonthlyStats();
}

function renderMonthlyStats(){
  const today=new Date();today.setHours(0,0,0,0);
  const curYM=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0');
  if(!_bkfViewMonth)_bkfViewMonth=curYM;
  const viewYM=_bkfViewMonth;
  const MON=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const fmtYM=ym=>{const[y,m]=ym.split('-').map(Number);return MON[m-1]+' '+y;};
  const canNext=viewYM<curYM;
  const isCur=viewYM===curYM;

  let bb=0,ro=0,days=0;
  Object.keys(_bkfHistory||{}).forEach(k=>{
    if(k.length!==10||k.slice(0,7)!==viewYM)return;
    const dt=new Date(k+'T12:00:00');dt.setHours(0,0,0,0);
    if(dt>today)return;
    bb+=(_bkfHistory[k].bb||0);ro+=(_bkfHistory[k].ro||0);days++;
  });

  let h=`<div id="bkf-monthly-wrap"><div class="section-title">Riepilogo mese</div>`;
  h+=`<div style="background:var(--surface);border-radius:12px;border:${isCur?'2px solid var(--accent)':'1px solid var(--border)'};padding:14px 16px;margin-bottom:10px;">`;
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${days?'12px':'4px'};">`;
  const btnStyle=`border:none;background:none;cursor:pointer;font-size:15px;color:var(--text-dim);padding:0 10px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;height:22px;`;
  h+=`<button onclick="bkfMonthNav(-1)" style="${btnStyle}">‹</button>`;
  h+=`<span style="font-size:14px;font-weight:700;color:${isCur?'var(--accent)':'var(--text)'};">${fmtYM(viewYM)}</span>`;
  h+=`<button onclick="bkfMonthNav(1)" style="${btnStyle}${!canNext?'opacity:.2;pointer-events:none;':''}">›</button>`;
  h+=`</div>`;
  if(days){
    h+=`<div style="font-size:10px;color:var(--text-dim);text-align:center;margin-bottom:10px;">${days} giorni</div>`;
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">`;
    h+=`<div style="text-align:center;"><div style="font-size:32px;font-weight:800;color:var(--accent);line-height:1;">${bb}</div><div style="font-size:11px;color:var(--text-dim);margin-top:3px;">BB totali</div></div>`;
    h+=`<div style="text-align:center;"><div style="font-size:32px;font-weight:800;color:var(--text-dim);line-height:1;">${ro}</div><div style="font-size:11px;color:var(--text-dim);margin-top:3px;">RO totali</div></div>`;
    h+=`</div>`;
  }else{
    h+=`<div style="text-align:center;color:var(--text-dim);font-size:12px;padding:6px 0;">Nessun dato</div>`;
  }
  h+=`</div></div>`;
  return h;
}

function renderChart(){
  const el=document.getElementById('bkf-chart-wrap');if(!el)return;
  const pts=bkfData.map(d=>({label:d.label.split(' ')[0],v:(d.adulti||0)+(d.bambini||0)}));
  const W=600,H=220,PL=36,PR=10,PT=36,PB=36;
  const plotW=W-PL-PR,plotH=H-PT-PB;
  const YMAX=Math.max(30,...pts.map(p=>p.v))+10;
  const step=Math.ceil(YMAX/4/10)*10||10;
  const sx=i=>PL+i/(pts.length-1||1)*plotW;
  const sy=v=>PT+plotH-(v/YMAX)*plotH;
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;">`;
  for(let v=0;v<=YMAX;v+=step){
    const y=sy(v);
    svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#e2d8cc" stroke-width="1"/>`;
    svg+=`<text x="${PL-4}" y="${y+5}" font-size="14" fill="#9a8878" text-anchor="end">${v}</text>`;
  }
  const linePath='M'+pts.map((p,i)=>`${sx(i)},${sy(p.v)}`).join('L');
  const areaPath=linePath+`L${sx(pts.length-1)},${sy(0)} L${sx(0)},${sy(0)} Z`;
  svg+=`<path d="${areaPath}" fill="#c9952f" opacity="0.12"/>`;
  svg+=`<path d="${linePath}" fill="none" stroke="#c9952f" stroke-width="2.5"/>`;
  pts.forEach((p,i)=>{
    const x=sx(i),y=sy(p.v);
    const isActive=i===currentIdx;
    svg+=`<circle cx="${x}" cy="${y}" r="${isActive?7:5}" fill="#c9952f" stroke="white" stroke-width="2"/>`;
    svg+=`<text x="${x}" y="${y-14}" font-size="${isActive?22:18}" fill="#1c3a5e" text-anchor="middle" font-weight="${isActive?'800':'600'}">${p.v}</text>`;
    svg+=`<text x="${x}" y="${H-5}" font-size="15" fill="#9a8878" text-anchor="middle">${p.label}</text>`;
  });
  svg+='</svg>';
  el.innerHTML=svg;
}
function bkfMergeHistory(){
  if(!bkfData||!bkfData.length)return;
  // Rimuovi vecchi record in formato YYYY-MM (aggregati mensili, formato obsoleto)
  Object.keys(_bkfHistory).forEach(k=>{if(k.length!==10)delete _bkfHistory[k];});
  // Salva ogni giorno come YYYY-MM-DD → {bb, ro}
  bkfData.forEach(d=>{
    if(!d.data)return;
    const p=d.data.split('/');if(p.length!==3)return;
    const key=p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
    _bkfHistory[key]={bb:(d.adulti||0)+(d.bambini||0),ro:(d.noCol||0)};
  });
  const json=JSON.stringify(_bkfHistory);
  try{localStorage.setItem(BKF_HIST_KEY,json);}catch(e){}
  fetch(PROXY+'/kv/set',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:BKF_HIST_KEY,value:json})}).catch(()=>{});
}

async function loadAll(){
  document.getElementById('mainContent').innerHTML=`<div class="loading"><div class="spinner"></div>Caricamento...</div>`;
  // Carica history
  try{
    const rh=await fetch(PROXY+'/kv/get?key='+BKF_HIST_KEY);
    const jh=await rh.json();
    if(jh.value){_bkfHistory=JSON.parse(jh.value);try{localStorage.setItem(BKF_HIST_KEY,jh.value);}catch(e){}}
  }catch(e){}
  try{
    const res=await fetch(PROXY+'/kv/get?key=qm_bkfData');
    const json=await res.json();
    if(json.value){
      const saved=JSON.parse(json.value);
      bkfData=saved.data||[];
      bkfData._ts=saved.ts||null;
      try{localStorage.setItem('bkf_cache',json.value);}catch(e){}
    }
  }catch(e){}
  try{

    document.getElementById('mainContent').innerHTML='<div class="no-data">Nessun dato disponibile.<br>Carica il report pasti dalla dashboard.</div>';

  }

// ── DDT ORDINI BKF ────────────────────────────────────────────────────────────
const DDT_KEY='qm_ddt';
const DDT_BKF={
  SDM:      {color:'#dcfce7',fg:'#166534'},
  MARR:     {color:'#fef3c7',fg:'#92400e'},
  Cozzolino:{color:'#fce7f3',fg:'#9d174d'},
};
const DDT_MON=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
let _ddtMonth='';
let _ddtFilter='tutti';
let _ddtSearch='';
let _ddtUploadModal=null;
let _ddtParsedData=null;
let _ddtUploadFornitore='';

function ddtBkfGet(){try{return JSON.parse(localStorage.getItem(DDT_KEY)||'[]');}catch(e){return[];}}
function ddtBkfSave(arr){
  const json=JSON.stringify(arr);
  try{localStorage.setItem(DDT_KEY,json);}catch(e){}
  fetch(PROXY+'/kv/set',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:DDT_KEY,value:json})}).catch(()=>{});
}
function ddtBkfCurMonth(){
  if(!_ddtMonth){const n=new Date();_ddtMonth=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
  return _ddtMonth;
}
function ddtBkfNavMonth(dir){
  const[y,m]=ddtBkfCurMonth().split('-').map(Number);
  const d=new Date(y,m-1+dir,1);
  _ddtMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  ddtBkfRenderSpese();ddtBkfRenderList();
}
function ddtBkfMonLabel(ym){const[y,m]=ym.split('-').map(Number);return DDT_MON[m-1]+' '+y;}
function ddtBkfFmt(n){if(!n&&n!==0)return'—';return'€ '+Number(n).toFixed(2).replace('.',',');}
function ddtBkfYM(data){const p=(data||'').split('/');if(p.length!==3)return'';return p[2]+'-'+p[1].padStart(2,'0');}

function ddtBkfRenderSpese(){
  const view=document.getElementById('ordiniContent');if(!view)return;
  const mon=ddtBkfCurMonth();
  const all=ddtBkfGet().filter(d=>d.reparto==='bkf');
  const monDdt=all.filter(d=>ddtBkfYM(d.data)===mon);
  const totale=monDdt.reduce((s,d)=>s+(d.totale_ordine||0),0);

  const kpi=(label,val,sub)=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;flex:1;min-width:120px;">
    <div style="font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">${label}</div>
    <div style="font-size:22px;font-weight:800;color:var(--text);">${val}</div>
    ${sub?`<div style="font-size:10px;color:var(--text-dim);margin-top:2px;">${sub}</div>`:''}
  </div>`;

  let h=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
    <button onclick="ddtBkfNavMonth(-1)" style="width:34px;height:34px;border:1px solid var(--border);background:var(--surface);border-radius:8px;cursor:pointer;font-size:18px;line-height:1;flex-shrink:0;">‹</button>
    <span style="font-size:16px;font-weight:700;color:var(--text);flex:1;text-align:center;">${ddtBkfMonLabel(mon)}</span>
    <button onclick="ddtBkfNavMonth(1)" style="width:34px;height:34px;border:1px solid var(--border);background:var(--surface);border-radius:8px;cursor:pointer;font-size:18px;line-height:1;flex-shrink:0;">›</button>
  </div>`;
  h+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;">
    ${kpi('Totale mese',ddtBkfFmt(totale),monDdt.length+' DDT')}
  </div>`;

  // Per fornitore
  h+=`<div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px;">Per fornitore — ${ddtBkfMonLabel(mon)}</div>`;
  h+=`<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:22px;">`;
  Object.entries(DDT_BKF).forEach(([nome,conf])=>{
    const fDdt=monDdt.filter(d=>d.fornitore===nome);
    const fTot=fDdt.reduce((s,d)=>s+(d.totale_ordine||0),0);
    const artMap={};
    fDdt.forEach(d=>(d.articoli||[]).forEach(a=>{
      const k=a.descrizione||'';if(!k)return;
      if(!artMap[k])artMap[k]={tot:0,qta:0,unita:a.unita||''};
      artMap[k].tot+=(a.totale||0);artMap[k].qta+=(a.qta||0);
    }));
    const top=Object.entries(artMap).sort((a,b)=>b[1].tot-a[1].tot).slice(0,4);
    const badge=`<span style="background:${conf.color};color:${conf.fg};padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">Breakfast</span>`;
    h+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${top.length?'10px':'0'};">
        <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:15px;font-weight:700;">${nome}</span>${badge}</div>
        <span style="font-size:15px;font-weight:800;color:${fTot?'var(--text)':'var(--text-dim)'};">${ddtBkfFmt(fTot)}</span>
      </div>`;
    if(top.length){
      h+=`<div style="border-top:1px solid var(--border);padding-top:8px;">`;
      top.forEach(([desc,info])=>h+=`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px;">
        <span style="color:var(--text-dim);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-right:12px;">${desc}</span>
        <span style="font-weight:600;">${ddtBkfFmt(info.tot)}</span></div>`);
      if(Object.keys(artMap).length>4)h+=`<div style="font-size:10px;color:var(--text-dim);margin-top:4px;">+ altri ${Object.keys(artMap).length-4} articoli</div>`;
      h+=`</div>`;
    }else{h+=`<div style="font-size:11px;color:var(--text-dim);">Nessun DDT in questo mese</div>`;}
    h+=`</div>`;
  });
  h+=`</div>`;

  // Storico 12 mesi
  const now=new Date();
  const months=[];
  for(let i=11;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));}
  const byMon={};months.forEach(m=>{byMon[m]={tot:0};});
  all.forEach(d=>{const ym=ddtBkfYM(d.data);if(!byMon[ym])return;byMon[ym].tot+=(d.totale_ordine||0);});
  h+=`<div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px;">Storico 12 mesi</div>
  <div style="overflow-x:auto;"><table style="border-collapse:collapse;width:100%;margin-bottom:22px;">
  <thead><tr>
    <th style="text-align:left;padding:6px 10px;font-size:10px;font-weight:700;color:var(--text-dim);border-bottom:1px solid var(--border);">Mese</th>
    <th style="text-align:right;padding:6px 10px;font-size:10px;font-weight:700;color:var(--text-dim);border-bottom:1px solid var(--border);">Totale BKF</th>
  </tr></thead><tbody>`;
  [...months].reverse().forEach(ym=>{
    const r=byMon[ym];const isCur=ym===mon;
    h+=`<tr style="background:${isCur?'#eef4ff':''};">
      <td style="padding:6px 10px;font-size:12px;font-weight:${isCur?700:400};color:${isCur?'var(--accent)':'var(--text)'};">${ddtBkfMonLabel(ym)}</td>
      <td style="padding:6px 10px;font-size:12px;text-align:right;font-weight:${r.tot?600:400};color:${r.tot?'var(--text)':'var(--text-dim)'};">${r.tot?ddtBkfFmt(r.tot):'—'}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;

  // Lista DDT (sezione sotto)
  h+=`<div id="ddtListSection"></div>`;
  view.innerHTML=h;
  ddtBkfRenderList();
}

const _ddtUploadHotel='sa';
function ddtBkfCloseModal(){if(_ddtUploadModal){_ddtUploadModal.remove();_ddtUploadModal=null;}_ddtParsedData=null;}

async function ddtBkfHandleFile(input){
  const file=input.files[0];if(!file)return;
  const forn=document.getElementById('ddt-sel-forn')?.value||_ddtUploadFornitore;
  const hotel=_ddtUploadHotel;
  const status=document.getElementById('ddt-parse-status');
  const result=document.getElementById('ddt-parsed-result');
  if(status){status.style.display='';status.textContent='⏳ Analisi AI in corso…';}
  if(result)result.style.display='none';
  try{
    const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    const isPdf=file.type==='application/pdf';
    const mediaType=isPdf?'application/pdf':(file.type||'image/jpeg');
    const prompt=`Estrai da questo documento di trasporto (DDT) italiano i dati e restituisci SOLO JSON valido:\n{"numero_ddt":"stringa","data":"DD/MM/YYYY","fornitore":"ragione sociale","articoli":[{"descrizione":"nome prodotto","qta":numero,"unita":"kg o lt o pz o cf etc","prezzo_unit":numero,"totale":numero}],"totale_ordine":numero}\nSe un valore non è leggibile usa null. Prezzi in EUR senza simbolo.`;
    const body={model:'claude-sonnet-4-20250514',max_tokens:2048,messages:[{role:'user',content:[
      isPdf?{type:'document',source:{type:'base64',media_type:mediaType,data:base64}}:{type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
      {type:'text',text:prompt}
    ]}]};
    const resp=await fetch(PROXY+'/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!resp.ok)throw new Error('API '+resp.status);
    const data=await resp.json();
    const text=data.content?.[0]?.text||'';
    let parsed={};
    try{const mm=text.match(/\{[\s\S]*\}/);if(mm)parsed=JSON.parse(mm[0]);}catch(e){throw new Error('JSON non valido');}
    if(forn)parsed.fornitore=forn;
    _ddtParsedData={...parsed,hotel,reparto:'bkf'};
    if(status)status.style.display='none';
    ddtBkfShowParsed(_ddtParsedData);
  }catch(e){
    if(status){status.textContent='❌ Errore: '+e.message;status.style.background='#fee2e2';status.style.color='#991b1b';}
  }
}

function ddtBkfShowParsed(d){
  const result=document.getElementById('ddt-parsed-result');if(!result)return;
  const inp=(val,cb,w,type,step)=>`<input ${type?'type="'+type+'"':''} ${step?'step="'+step+'"':''} value="${val!=null?val:''}" onchange="${cb}" style="width:${w||'100%'};padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--surface);${type==='number'?'text-align:right;':''}">`;
  const artRows=(d.articoli||[]).map((a,i)=>`<tr>
    <td style="padding:3px 4px;">${inp(a.descrizione,'_ddtParsedData.articoli['+i+'].descrizione=this.value','120px','','')}</td>
    <td style="padding:3px 4px;">${inp(a.qta,'_ddtParsedData.articoli['+i+'].qta=parseFloat(this.value)||0','48px','number','0.001')}</td>
    <td style="padding:3px 4px;">${inp(a.unita,'_ddtParsedData.articoli['+i+'].unita=this.value','36px','','')}</td>
    <td style="padding:3px 4px;">${inp(a.prezzo_unit,'_ddtParsedData.articoli['+i+'].prezzo_unit=parseFloat(this.value)||0','58px','number','0.01')}</td>
    <td style="padding:3px 4px;">${inp(a.totale,'_ddtParsedData.articoli['+i+'].totale=parseFloat(this.value)||0','58px','number','0.01')}</td>
    <td style="padding:3px 4px;"><button onclick="ddtBkfRemoveArt(${i})" style="font-size:11px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;cursor:pointer;">✕</button></td>
  </tr>`).join('');
  result.style.display='';
  result.innerHTML=`<div style="border-top:1px solid var(--border);padding-top:12px;">
    <div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:10px;">✅ DDT rilevato — verifica e conferma</div>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <div style="flex:1;"><label style="font-size:10px;font-weight:700;color:var(--text-dim);display:block;margin-bottom:3px;">DATA</label>
        <input value="${d.data||''}" onchange="_ddtParsedData.data=this.value" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--surface);">
      </div>
      <div style="flex:1;"><label style="font-size:10px;font-weight:700;color:var(--text-dim);display:block;margin-bottom:3px;">N° DDT</label>
        <input value="${d.numero_ddt||''}" onchange="_ddtParsedData.numero_ddt=this.value" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--surface);">
      </div>
    </div>
    <div style="margin-bottom:10px;"><label style="font-size:10px;font-weight:700;color:var(--text-dim);display:block;margin-bottom:3px;">TOTALE €</label>
      <input type="number" step="0.01" value="${d.totale_ordine!=null?d.totale_ordine:''}" onchange="_ddtParsedData.totale_ordine=parseFloat(this.value)||0" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--surface);text-align:right;">
    </div>
    <div style="overflow-x:auto;margin-bottom:10px;">
      <table style="border-collapse:collapse;font-size:12px;">
        <thead><tr style="background:var(--surface2);">
          <th style="padding:5px 4px;text-align:left;font-size:10px;color:var(--text-dim);min-width:120px;">Descrizione</th>
          <th style="padding:5px 4px;text-align:right;font-size:10px;color:var(--text-dim);">Qtà</th>
          <th style="padding:5px 4px;text-align:center;font-size:10px;color:var(--text-dim);">UM</th>
          <th style="padding:5px 4px;text-align:right;font-size:10px;color:var(--text-dim);">P.Unit</th>
          <th style="padding:5px 4px;text-align:right;font-size:10px;color:var(--text-dim);">Totale</th>
          <th></th>
        </tr></thead>
        <tbody>${artRows}</tbody>
      </table>
    </div>
    <button onclick="ddtBkfAddArt()" style="font-size:11px;padding:5px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;margin-bottom:12px;">+ Aggiungi riga</button>
    <button onclick="ddtBkfConfirmSave()" style="width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">💾 Salva DDT</button>
  </div>`;
}
function ddtBkfRemoveArt(i){if(!_ddtParsedData)return;_ddtParsedData.articoli.splice(i,1);ddtBkfShowParsed(_ddtParsedData);}
function ddtBkfAddArt(){if(!_ddtParsedData)return;(_ddtParsedData.articoli=_ddtParsedData.articoli||[]).push({descrizione:'',qta:null,unita:'',prezzo_unit:null,totale:null});ddtBkfShowParsed(_ddtParsedData);}

function ddtBkfConfirmSave(){
  if(!_ddtParsedData)return;
  const arr=ddtBkfGet();
  arr.push({id:Date.now()+'_'+Math.random().toString(36).slice(2,6),ts:Date.now(),
    data:_ddtParsedData.data||'',fornitore:_ddtParsedData.fornitore||'',
    reparto:'bkf',hotel:_ddtParsedData.hotel||'sa',
    numero_ddt:_ddtParsedData.numero_ddt||'',
    articoli:_ddtParsedData.articoli||[],
    totale_ordine:_ddtParsedData.totale_ordine||0});
  ddtBkfSave(arr);
  ddtBkfCloseModal();
  ddtBkfRenderSpese();
}
function ddtBkfDelete(id){
  if(!confirm('Eliminare questo DDT?'))return;
  ddtBkfSave(ddtBkfGet().filter(d=>d.id!==id));
  ddtBkfRenderSpese();
}

// Carica DDT da KV all'avvio (senza bloccare)
(async function loadDdt(){
  try{
    const res=await fetch(PROXY+'/kv/get?key='+DDT_KEY);
    const json=await res.json();
    if(json.value){try{localStorage.setItem(DDT_KEY,json.value);}catch(e){}}
  }catch(e){}
})();

// Contatore accessi per dispositivo
(async function trackAccess(){
  try{
    if(location.search.includes('notrack')){localStorage.setItem('qm_no_track','1');return;}
    if(localStorage.getItem('qm_no_track')==='1'||localStorage.getItem('bkf_no_track')==='1')return;
    let devId=localStorage.getItem('bkf_device_id');
    if(!devId){devId='dev_'+Math.random().toString(36).slice(2,10)+'_'+Date.now().toString(36);localStorage.setItem('bkf_device_id',devId);}
    const todayStr=new Date().toISOString().slice(0,10);
    const nowIso=new Date().toISOString();
    const res=await fetch(PROXY+'/kv/get?key=qm_bkf_access');
    const json=await res.json();
    const d=json.value?JSON.parse(json.value):{total:0,today:0,todayDate:'',last:null,devices:{}};
    d.total=(d.total||0)+1;
    d.today=d.todayDate===todayStr?(d.today||0)+1:1;
    d.todayDate=todayStr;
    d.last=nowIso;
    if(!d.devices)d.devices={};
    const dev=d.devices[devId]||{firstSeen:nowIso,total:0,today:0,todayDate:'',last:null};
    dev.total=(dev.total||0)+1;
    dev.today=dev.todayDate===todayStr?(dev.today||0)+1:1;
    dev.todayDate=todayStr;
    dev.last=nowIso;
    d.devices[devId]=dev;
    await fetch(PROXY+'/kv/set',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:'qm_bkf_access',value:JSON.stringify(d)})});
  }catch(e){}
})();
</script>
