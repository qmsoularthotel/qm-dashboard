<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Breakfast — SoulArt Hotel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --accent:#7c3a00;
  --green:#1a7f5a;
  --amber:#b45309;
  --red:#dc2626;
  --bg:#f5f0ea;
  --surface:#ffffff;
  --surface2:#f5f0e8;
  --border:#e2d8cc;
  --text:#1a1612;
  --text-dim:#6b5e50;
  --text-muted:#9a8878;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#141210;--surface:#1c1a16;--surface2:#242018;--border:#3a3428;--text:#e8e0d8;--text-dim:#9a8878;--text-muted:#6b5e50;--accent:#f59e42;--green:#34d399;--amber:#fbbf24;--red:#f87171;}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}

.header{background:var(--accent);padding:16px 20px 14px;position:sticky;top:0;z-index:10;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.header-title{font-size:18px;font-weight:700;color:#fff;}
.header-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px;}
.header-time{font-size:22px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;}
.header-date{font-size:11px;color:rgba(255,255,255,.7);text-align:right;margin-top:1px;}

.day-nav{display:flex;align-items:center;gap:0;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden;}
.day-nav button{background:none;border:none;color:#fff;padding:7px 14px;font-size:20px;cursor:pointer;flex-shrink:0;opacity:.8;}
.day-nav button:active{opacity:.5;}
.day-label-wrap{flex:1;text-align:center;}
.day-label-main{font-size:15px;font-weight:700;color:#fff;}
.day-label-sub{font-size:11px;color:rgba(255,255,255,.7);}

.content{padding:14px;}

.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px;}
.kpi-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.kpi-card{background:var(--surface);border-radius:12px;padding:14px 12px;text-align:center;border:1px solid var(--border);}
.kpi-card.main{border-top:3px solid var(--accent);grid-column:span 2;}
.kpi-val{font-size:42px;font-weight:700;line-height:1;margin-bottom:4px;color:var(--accent);}
.kpi-val.sm{font-size:28px;}
.kpi-lbl{font-size:11px;color:var(--text-dim);letter-spacing:.04em;}

.no-data{background:var(--surface);border-radius:12px;padding:32px 24px;text-align:center;color:var(--text-dim);font-size:14px;border:1px solid var(--border);}

.section-title{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;padding-left:2px;}

.preview-card{background:var(--surface);border-radius:12px;padding:12px 14px;border:1px solid var(--border);margin-bottom:8px;}
.preview-day{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;}
.preview-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.preview-item{background:var(--surface2);border-radius:7px;padding:7px 6px;text-align:center;}
.preview-val{font-size:18px;font-weight:700;line-height:1;margin-bottom:2px;color:var(--accent);}
.preview-val.muted{color:var(--text-muted);}
.preview-lbl{font-size:10px;color:var(--text-dim);}

.loading{text-align:center;padding:60px 20px;color:var(--text-dim);}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

.refresh-row{text-align:center;padding:16px 0 28px;font-size:12px;color:var(--text-dim);}
.refresh-row a{color:var(--accent);text-decoration:none;font-weight:500;}

.update-ts{background:var(--surface2);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:11px;color:var(--text-dim);}
.update-ts-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">☕ Breakfast</div>
      <div class="header-sub">SoulArt Hotel</div>
      <div id="hDataTs" style="font-size:10px;color:rgba(255,255,255,.55);margin-top:3px;"></div>
    </div>
    <div style="text-align:right;">
      <div class="header-time" id="hTime">--:--</div>
      <div class="header-date" id="hDate">—</div>
    </div>
  </div>
  <div class="day-nav">
    <button onclick="changeDay(-1)">‹</button>
    <div class="day-label-wrap">
      <div class="day-label-main" id="navDayMain">—</div>
      <div class="day-label-sub" id="navDaySub">—</div>
    </div>
    <button onclick="changeDay(1)">›</button>
  </div>
</div>

<div class="content" id="mainContent">
  <div class="loading">
    <div class="spinner"></div>
    Caricamento dati...
  </div>
</div>

<script>
const PROXY='https://anthropic-proxy.qm-d82.workers.dev';
const GIORNI=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const GIORNI_S=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MESI=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];

let bkfData=null;
let currentIdx=0;

// Orologio e data
function tick(){
  const n=new Date();
  document.getElementById('hTime').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('hDate').textContent=GIORNI[n.getDay()]+' '+n.getDate()+' '+MESI[n.getMonth()];
}
tick();setInterval(tick,10000);

function parseDate(str){
  if(!str)return null;
  const p=str.split('/');
  if(p.length===3)return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]),12,0,0);
  return null;
}

function findTodayIdx(){
  const today=new Date();today.setHours(0,0,0,0);
  let idx=bkfData.findIndex(d=>{const dd=parseDate(d.data);if(!dd)return false;dd.setHours(0,0,0,0);return dd.getTime()===today.getTime();});
  if(idx===-1){
    const now=new Date();now.setHours(0,0,0,0);
    idx=bkfData.findIndex(d=>{const dd=parseDate(d.data);if(!dd)return false;dd.setHours(0,0,0,0);return dd>=now;});
    if(idx===-1)idx=bkfData.length-1;
  }
  return Math.max(0,idx);
}

function changeDay(dir){
  currentIdx=Math.max(0,Math.min(bkfData.length-1,currentIdx+dir));
  try{sessionStorage.setItem('bkf_day_idx',currentIdx);}catch(e){}
  renderDay();
}

function renderDay(){
  if(!bkfData||!bkfData.length){
    document.getElementById('mainContent').innerHTML='<div class="no-data">Nessun dato disponibile</div>';
    return;
  }
  const d=bkfData[currentIdx];
  const coperti=(d.adulti||0)+(d.bambini||0);
  const today=new Date();today.setHours(0,0,0,0);
  const dd=parseDate(d.data);
  const isToday=dd&&(dd.setHours(0,0,0,0),dd.getTime()===today.getTime());

  // Header nav
  document.getElementById('navDayMain').textContent=d.label||'—';
  document.getElementById('navDaySub').textContent=isToday?'Oggi':'';

  // Aggiorna timestamp header
  const tsEl=document.getElementById('hDataTs');
  if(tsEl&&bkfData._ts){const dt=new Date(bkfData._ts);tsEl.textContent='Aggiornato '+dt.getDate()+' '+MESI[dt.getMonth()]+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');}

  let html='';

  // KPI principale
  html+=`<div class="kpi-grid" style="grid-template-columns:1fr;margin-bottom:10px;">
    <div class="kpi-card" style="border-top:3px solid var(--accent);">
      <div class="kpi-lbl" style="margin-bottom:6px;">Coperti totali</div>
      <div class="kpi-val">${coperti}</div>
    </div>
  </div>`;

  // KPI dettaglio
  html+=`<div class="kpi-grid" style="grid-template-columns:1fr 1fr;margin-bottom:10px;">
    <div class="kpi-card">
      <div class="kpi-val sm">${coperti}</div>
      <div class="kpi-lbl">Coperti</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val sm" style="color:var(--text-muted);">${d.noCol||0}</div>
      <div class="kpi-lbl">Room Only</div>
    </div>
  </div>`;

  // Grafico settimanale
  html+=`<div style="background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:12px 14px;margin-bottom:10px;" id="bkf-chart-wrap"></div>`;

  // Prossimi giorni
  const nextDays=bkfData.slice(currentIdx+1,currentIdx+4);
  if(nextDays.length){
    html+=`<div class="section-title">Prossimi giorni</div>`;
    nextDays.forEach(nd=>{
      const tot=(nd.adulti||0)+(nd.bambini||0);
      html+=`<div class="preview-card">
        <div class="preview-day">${nd.label}</div>
        <div class="preview-row" style="grid-template-columns:1fr 1fr 1fr;">
          <div class="preview-item"><div class="preview-val">${tot}</div><div class="preview-lbl">Coperti</div></div>
          <div class="preview-item"><div class="preview-val">${nd.adulti||0}</div><div class="preview-lbl">Adulti</div></div>
          <div class="preview-item"><div class="preview-val muted">${nd.noCol||0}</div><div class="preview-lbl">Room Only</div></div>
        </div>
      </div>`;
    });
  }

  html+=`<div class="refresh-row"><a href="javascript:loadAll()">↻ Aggiorna ora</a></div>`;
  document.getElementById('mainContent').innerHTML=html;
  renderChart();
}

function renderChart(){
  const el=document.getElementById('bkf-chart-wrap');if(!el)return;
  const pts=bkfData.map(d=>({label:d.label.split(' ')[0],v:(d.adulti||0)+(d.bambini||0)}));
  const W=600,H=220,PL=36,PR=10,PT=36,PB=36;
  const plotW=W-PL-PR,plotH=H-PT-PB;
  const YMAX=Math.max(30,...pts.map(p=>p.v))+10;
  const step=Math.ceil(YMAX/4/10)*10||10;
  const sx=i=>PL+i/(pts.length-1||1)*plotW;
  const sy=v=>PT+plotH-(v/YMAX)*plotH;
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;">`;
  for(let v=0;v<=YMAX;v+=step){
    const y=sy(v);
    svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#e2d8cc" stroke-width="1"/>`;
    svg+=`<text x="${PL-4}" y="${y+5}" font-size="14" fill="#9a8878" text-anchor="end">${v}</text>`;
  }
  const linePath='M'+pts.map((p,i)=>`${sx(i)},${sy(p.v)}`).join('L');
  const areaPath=linePath+`L${sx(pts.length-1)},${sy(0)} L${sx(0)},${sy(0)} Z`;
  svg+=`<path d="${areaPath}" fill="#b45309" opacity="0.12"/>`;
  svg+=`<path d="${linePath}" fill="none" stroke="#b45309" stroke-width="2.5"/>`;
  pts.forEach((p,i)=>{
    const x=sx(i),y=sy(p.v);
    const isActive=i===currentIdx;
    svg+=`<circle cx="${x}" cy="${y}" r="${isActive?7:5}" fill="#b45309" stroke="white" stroke-width="2"/>`;
    svg+=`<text x="${x}" y="${y-14}" font-size="${isActive?22:18}" fill="#7c3a00" text-anchor="middle" font-weight="${isActive?'800':'600'}">${p.v}</text>`;
    svg+=`<text x="${x}" y="${H-5}" font-size="15" fill="#9a8878" text-anchor="middle">${p.label}</text>`;
  });
  svg+='</svg>';
  el.innerHTML=svg;
}
async function loadAll(){
  document.getElementById('mainContent').innerHTML=`<div class="loading"><div class="spinner"></div>Caricamento...</div>`;
  try{
    const res=await fetch(PROXY+'/kv/get?key=qm_bkfData');
    const json=await res.json();
    if(json.value){
      const saved=JSON.parse(json.value);
      bkfData=saved.data||[];
      bkfData._ts=saved.ts||null;
      try{localStorage.setItem('bkf_cache',json.value);}catch(e){}
    }
  }catch(e){}
  if(!bkfData||!bkfData.length){
    document.getElementById('mainContent').innerHTML='<div class="no-data">Nessun dato disponibile.<br>Carica il report pasti dalla dashboard.</div>';
    return;
  }
  try{const saved=sessionStorage.getItem('bkf_day_idx');currentIdx=saved!==null?Math.min(parseInt(saved),bkfData.length-1):findTodayIdx();}catch(e){currentIdx=findTodayIdx();}
  renderDay();
}

// Carica prima da cache locale
try{
  const c=localStorage.getItem('bkf_cache');
  if(c){const saved=JSON.parse(c);bkfData=saved.data||[];bkfData._ts=saved.ts||null;
    try{const si=sessionStorage.getItem('bkf_day_idx');currentIdx=si!==null?Math.min(parseInt(si),bkfData.length-1):findTodayIdx();}catch(e){currentIdx=findTodayIdx();}
    renderDay();}
}catch(e){}

loadAll();
setInterval(loadAll,10*60*1000);

// Contatore accessi
(async function trackAccess(){
  try{
    if(location.search.includes('notrack')){localStorage.setItem('bkf_no_track','1');return;}
    if(localStorage.getItem('bkf_no_track')==='1')return;
    const todayStr=new Date().toISOString().slice(0,10);
    const res=await fetch(PROXY+'/kv/get?key=qm_bkf_access');
    const json=await res.json();
    const d=json.value?JSON.parse(json.value):{total:0,today:0,todayDate:'',last:null};
    d.total=(d.total||0)+1;
    d.today=d.todayDate===todayStr?(d.today||0)+1:1;
    d.todayDate=todayStr;
    d.last=new Date().toISOString();
    await fetch(PROXY+'/kv/set',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:'qm_bkf_access',value:JSON.stringify(d)})});
  }catch(e){}
})();
</script>
</body>
</html>
